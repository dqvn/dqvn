<head>

  <script>(function(){try{var v=(JSON.parse(localStorage.getItem('nl_portal_theme'))||{}).v||'orange';document.documentElement.setAttribute('data-theme',v||'orange');}catch(e){document.documentElement.setAttribute('data-theme','orange');}})();</script>

  <title>📚 Kinderverhalen – Nederlands</title>
  <link rel="icon" href="assets/img/dutch.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Tokens (orange default — overridden by themes.css) ── */
    :root {
      --bg:          #fef7ed;
      --card:        #ffffff;
      --text:        #1c1917;
      --text-2:      #57534e;
      --text-3:      #a8a29e;
      --accent:      #ea580c;
      --accent-h:    #c2410c;
      --border:      #fed7aa;
      --border-soft: #fde8c8;
      --sb:          #12192c;
      --sb-h:        #1c2a42;
      --nav-h:       56px;
      --r:           16px;
    }

    /* ── Base ── */
    body {
      font-family: 'Nunito', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Background image (story atmosphere) ── */
    #backgroundImage {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-size: cover;
      background-position: center;
      opacity: 0.1;
      pointer-events: none;
      transition: background-image 1s ease;
    }
    [data-theme="dark"] #backgroundImage { display: none; }

    /* ── Top nav ── */
    #top-nav {
      position: relative;
      z-index: 100;
      height: var(--nav-h);
      flex-shrink: 0;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
    }
    .nav-back {
      font-size: 1.1rem; line-height: 1;
      padding: 5px 8px; border-radius: 8px;
      text-decoration: none;
      flex-shrink: 0;
      color: rgba(255,255,255,.82);
      transition: background .15s;
    }
    .nav-back:hover { background: rgba(255,255,255,.12); }
    #sb-back-link { display: none; }
    .nav-title {
      flex: 1;
      text-align: center;
      font-size: 1rem;
      font-weight: 900;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nav-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .nav-play-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 12px rgba(0,0,0,.18);
      transition: transform .15s, background .15s;
      flex-shrink: 0;
    }
    .nav-play-btn:hover { transform: scale(1.1); background: var(--accent-h); }
    .nav-list-btn {
      width: 38px; height: 38px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text-2);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s;
    }
    .nav-list-btn:hover { background: var(--border-soft); color: var(--text); }

    /* ── Layout shell ── */
    #app-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 260px;
      flex-shrink: 0;
      background: var(--sb);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sb-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 14px 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      flex-shrink: 0;
    }
    .sb-title {
      font-size: .9rem;
      font-weight: 800;
      color: rgba(255,255,255,.9);
    }
    .sb-close {
      display: none;
      background: none;
      border: none;
      color: rgba(255,255,255,.5);
      font-size: 1.1rem;
      cursor: pointer;
      line-height: 1;
      padding: 2px 6px;
    }
    .sb-close:hover { color: #fff; }

    /* Story list */
    .stories-list {
      flex: 1;
      overflow-y: auto;
      list-style: none;
      padding: 8px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.15) transparent;
    }
    .story-item {
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 3px;
      transition: background .15s;
      border: 1.5px solid transparent;
    }
    .story-item:hover { background: var(--sb-h); }
    .story-item.active {
      background: var(--accent);
      border-color: rgba(255,255,255,.25);
    }
    .story-item-title {
      font-size: .82rem;
      font-weight: 700;
      color: rgba(255,255,255,.88);
      line-height: 1.3;
    }
    .story-item.active .story-item-title { color: #fff; }
    .story-item-sub {
      font-size: .7rem;
      color: rgba(255,255,255,.42);
      margin-top: 2px;
    }
    .story-item.active .story-item-sub { color: rgba(255,255,255,.7); }
    .sb-group-label {
      font-size: .62rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: rgba(255,255,255,.28);
      padding: 10px 12px 4px;
    }

    /* Sidebar back link */
    #sb-back-link {
      flex-shrink: 0;
      padding: 8px 14px;
      border-top: 1px solid rgba(255,255,255,.07);
    }
    #sb-back-link a {
      font-size: .75rem;
      font-weight: 600;
      color: rgba(255,255,255,.35);
      text-decoration: none;
      transition: color .15s;
    }
    #sb-back-link a:hover { color: var(--accent); }

    /* ── Drawer overlay (mobile) ── */
    #drawer-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 199;
      backdrop-filter: blur(2px);
    }
    #drawer-overlay.on { display: block; }

    /* ── Main content ── */
    #main {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 0;
    }

    /* ── Story header card ── */
    #story-header {
      background: var(--card);
      border-radius: var(--r);
      border: 1px solid var(--border-soft);
      padding: 20px 24px 16px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }
    .story-emoji {
      font-size: 3rem;
      line-height: 1;
      margin-bottom: 10px;
    }
    #storyTitle {
      font-size: 1.25rem;
      font-weight: 900;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 14px;
    }

    /* ── Language tabs ── */
    .lang-tabs {
      display: flex;
      justify-content: center;
      gap: 8px;
    }
    .language-tab {
      padding: 7px 18px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--text-2);
      font-family: inherit;
      font-size: .82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .18s;
    }
    .language-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .language-tab:hover:not(.active) {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Story text ── */
    .language-content { display: none; }
    .language-content.active { display: block; }

    .story-text {
      background: var(--card);
      border-radius: var(--r);
      border: 1px solid var(--border-soft);
      padding: 24px 28px;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
      line-height: 1.75;
    }

    /* Dutch: Caveat handwriting */
    .story-nl {
      font-family: 'Caveat', cursive;
      font-size: 1.55rem;
      font-weight: 500;
      color: var(--text);
      border-left: 4px solid var(--accent);
    }

    /* English: regular, italic, muted */
    .story-en {
      font-size: .98rem;
      font-style: italic;
      color: var(--text-2);
      border-left: 4px solid var(--border);
    }

    /* ── Speed bar ── */
    #speed-bar {
      background: var(--card);
      border: 1px solid var(--border-soft);
      border-radius: var(--r);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
    }
    #speed-bar label {
      font-size: .8rem;
      font-weight: 700;
      color: var(--text-2);
      white-space: nowrap;
    }
    #speedSlider {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
    }
    #speedValue {
      font-size: .82rem;
      font-weight: 700;
      color: var(--text-3);
      min-width: 36px;
      font-variant-numeric: tabular-nums;
    }

    /* ── Mobile (≤ 700px) ── */
    @media (max-width: 700px) {
      #sidebar {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        width: 100%;
        max-height: 72dvh;
        border-radius: 20px 20px 0 0;
        z-index: 200;
        transform: translateY(100%);
        transition: transform .32s cubic-bezier(.4,0,.2,1);
        box-shadow: 0 -8px 40px rgba(0,0,0,.3);
      }
      #sidebar.open { transform: translateY(0); }
      .sb-drag-handle {
        display: block;
        width: 36px; height: 4px;
        background: rgba(255,255,255,.25);
        border-radius: 2px;
        margin: 10px auto 2px;
        flex-shrink: 0;
      }
      .sb-close { display: flex; }
      #main { padding: 12px; }
      .story-nl { font-size: 1.35rem; }
      .story-text { padding: 18px 18px; }
      #story-header { padding: 16px 16px 14px; }
    }
    .sb-drag-handle { display: none; }

    /* ── Desktop: hide toggle, always show sidebar ── */
    @media (min-width: 701px) {
      .nav-list-btn { display: none; }
    }
  </style>

<body>

  <div id="backgroundImage"></div>

  <!-- ── Top nav ── -->
  <nav id="top-nav">
    <a href="/dqvn/" class="nav-back" title="Terug naar portaal" aria-label="Terug naar portaal">🏠</a>

  <!-- ── App layout ── -->
  <div id="app-layout">

    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="sb-drag-handle"></div>
      <div class="sb-header">
        <span class="sb-title">📚 Verhalen</span>
        <button class="sb-close" onclick="closeSidebar()">✕</button>

      <div id="sb-back-link">
        <a href="/dqvn/">← Terug naar portaal</a>

    </nav>

    <!-- Backdrop (mobile) -->
    <div id="drawer-overlay" onclick="closeSidebar()"></div>

    <!-- Main content -->
    <main id="main">

      <!-- Story header -->
      <div id="story-header">
        <div id="storyCharacter" class="story-emoji">📚</div>
        <h2 id="storyTitle">Kies een verhaal ←</h2>
        <div class="lang-tabs">
          <button class="language-tab active" data-lang="dutch">🇳🇱 Nederlands</button>

      <!-- Dutch story text (Caveat handwriting) -->
      <div class="language-content active" id="dutchContent">

      <!-- Speed control -->
      <div id="speed-bar">
        <label>⏩ Snelheid</label>
        <input type="range" min="0.5" max="2" step="0.1" value="1" id="speedSlider">

      </div>

    </main>

  <!-- Hidden compat elements -->
  <button id="stopButton" style="display:none"></button>

  <script>
    // LocalStorage Keys
    const STORAGE_KEYS = {
        CURRENT_STORY: 'currentReadingStory',
        READING_PROGRESS: 'storyReadingProgress',
        SPEECH_SETTINGS: 'speechSettings',
        FAVORITES: 'favoriteStories'
    };

    // Stories data
    const stories = [
        {
            "id": 1,
            "group": 1,
            "title": "De Kleine Kat",
            "titleEn": "The Little Cat",
            "content_nl": "Er was eens een kleine kat. Zijn naam was Toby. Toby was heel nieuwsgierig. Hij hield van avontuur. Op een dag zag Toby een grote boom. De boom was heel hoog. Toby klom in de boom. Maar toen kon hij niet meer naar beneden. Toby was bang. Hij begon te miauwen. Een klein meisje hoorde Toby. Ze hielp hem uit de boom. Toby was heel blij. Hij gaf het meisje een kopstoot. Ze werden de beste vrienden.",
            "content_en": "Once upon a time, there was a little cat. His name was Toby. Toby was very curious. He loved adventure. One day, Toby saw a big tree. The tree was very tall. Toby climbed the tree. But then he couldn't get down. Toby was scared. He started to meow. A little girl heard Toby. She helped him out of the tree. Toby was very happy. He gave the girl a head bump. They became best friends.",
            "image_query": "cute kitten tree adventure",
            "character": "🐱"
        },
        {
            "id": 2,
            "group": 1,
            "title": "De Dierenpicknick",
            "titleEn": "The Animal Picnic",
            "content_nl": "Op een zonnige dag besloot Konijn een picknick te organiseren. Hij nodigde al zijn vrienden uit: Eekhoorn, Egel, Muis en Vogel. Iedereen bracht iets lekkers mee. Konijn bracht wortels. Eekhoorn bracht noten. Egel bracht bessen. Muis bracht kaas. En Vogel bracht zaden. Ze speelden spelletjes en zongen liedjes. Het was een geweldige dag. Toen de zon onderging, waren alle dieren moe maar gelukkig. Ze beloofden snel weer een picknick te houden.",
            "content_en": "On a sunny day, Rabbit decided to organize a picnic. He invited all his friends: Squirrel, Hedgehog, Mouse and Bird. Everyone brought something tasty. Rabbit brought carrots. Squirrel brought nuts. Hedgehog brought berries. Mouse brought cheese. And Bird brought seeds. They played games and sang songs. It was a wonderful day. When the sun went down, all the animals were tired but happy. They promised to have another picnic soon.",
            "image_query": "animal forest picnic",
            "character": "🐰"
        },
        {
            "id": 3,
            "group": 1,
            "title": "De Regendans",
            "titleEn": "The Rain Dance",
            "content_nl": "Het was een hele warme dag. De bloemen hingen hun hoofd. De dieren waren dorstig. Toen had Kikker een idee. 'Laten we een regendans doen!' zei hij. Alle dieren keken verbaasd. 'Een regendans?' vroeg Eend. 'Ja!' zei Kikker. Hij begon te dansen. Eerst aarzelden de andere dieren, maar toen deden ze allemaal mee. Ze dansten en zongen. En weet je wat? Er vielen druppels! Eerst een paar, toen meer en meer. Het regende! De dieren juichten. De bloemen stonden weer rechtop. Iedereen was blij.",
            "content_en": "It was a very hot day. The flowers were drooping. The animals were thirsty. Then Frog had an idea. 'Let's do a rain dance!' he said. All the animals looked surprised. 'A rain dance?' asked Duck. 'Yes!' said Frog. He started to dance. At first the other animals hesitated, but then they all joined in. They danced and sang. And you know what? Drops started falling! First a few, then more and more. It rained! The animals cheered. The flowers stood up straight again. Everyone was happy.",
            "image_query": "frog rain dance animals",
            "character": "🐸"
        },
        {
            "id": 4,
            "group": 1,
            "title": "Het Verdwaalde Lammetje",
            "titleEn": "The Lost Lamb",
            "content_nl": "Lammetje Lola was nieuwsgierig. Ze wilde de wereld verkennen. Terwijl haar moeder sliep, liep Lola weg. Ze liep door het veld. Ze liep langs de beek. Ze liep het bos in. Toen werd het donker. Lola was verdwaald. Ze begon te huilen. 'Mama! Mama!' riep ze. Een wijze uil hoorde haar. 'Ik help je,' zei de uil. Hij vloog hoog en zag de kudde. Hij wees Lola de weg. Lola rende terug naar haar moeder. Ze beloofde nooit meer alleen weg te lopen.",
            "content_en": "Lamb Lola was curious. She wanted to explore the world. While her mother was sleeping, Lola walked away. She walked through the field. She walked along the stream. She walked into the forest. Then it got dark. Lola was lost. She started to cry. 'Mama! Mama!' she called. A wise owl heard her. 'I'll help you,' said the owl. He flew high and saw the flock. He showed Lola the way. Lola ran back to her mother. She promised never to walk away alone again.",
            "image_query": "little lamb farm",
            "character": "🐑"
        },
        {
            "id": 5,
            "group": 1,
            "title": "De Kleine Trein",
            "titleEn": "The Little Train",
            "content_nl": "Er was een kleine trein. Zijn naam was Thomas. Thomas wilde graag helpen. Op een dag moest Thomas naar de andere kant van de berg. De berg was heel steil. 'Ik denk niet dat ik het kan,' zei Thomas. 'Je kunt het!' zeiden zijn vrienden. Thomas nam een diepe adem. 'Ik denk dat ik kan, ik denk dat ik kan,' zei hij. En hij begon te klimmen. Langzaam maar zeker klom Thomas de berg op. Toen hij boven was, was iedereen trots. Thomas had het gedaan!",
            "content_en": "There was a little train. His name was Thomas. Thomas really wanted to help. One day, Thomas had to go to the other side of the mountain. The mountain was very steep. 'I don't think I can do it,' said Thomas. 'You can!' said his friends. Thomas took a deep breath. 'I think I can, I think I can,' he said. And he started to climb. Slowly but surely, Thomas climbed the mountain. When he reached the top, everyone was proud. Thomas had done it!",
            "image_query": "little train mountain",
            "character": "🚂"
        },
        {
            "id": 6,
            "group": 1,
            "title": "De Kleine Zeemeermin",
            "titleEn": "The Little Mermaid",
            "content_nl": "Diep in de zee woonde een kleine zeemeermin. Haar naam was Marijn. Marijn hield van zingen. Elke dag zong ze voor de vissen. Op een dag hoorde een dolfijn haar zingen. Hij was zo onder de indruk dat hij alle zeedieren bijeen riep. Ze organiseerden een groot concert. Marijn zong het mooiste lied dat de oceaan ooit had gehoord. Alle dieren dansten en juichten. Vanaf die dag werd Marijn de zangeres van de zee genoemd.",
            "content_en": "Deep in the sea lived a little mermaid. Her name was Marijn. Marijn loved singing. Every day she sang for the fish. One day a dolphin heard her singing. He was so impressed that he gathered all the sea creatures. They organized a big concert. Marijn sang the most beautiful song the ocean had ever heard. All the animals danced and cheered. From that day on, Marijn was called the singer of the sea.",
            "image_query": "little mermaid ocean",
            "character": "🧜‍♀️"
        },
        {
            "id": 7,
            "group": 1,
            "title": "De Grote Ballon",
            "titleEn": "The Big Balloon",
            "content_nl": "Lotte kreeg een grote rode ballon. De ballon was zo groot als haar hoofd. Ze hield stevig vast aan het touwtje. Maar toen liet ze per ongeluk los! De ballon vloog de lucht in. Lotte keek ernaar terwijl hij hoger en hoger vloog. De ballon vloog over de huizen. Hij vloog over de bomen. Uiteindelijk verdween hij achter een wolk. Lotte was een beetje verdrietig, maar toen beloofde haar vader een nieuwe ballon te kopen.",
            "content_en": "Lotte got a big red balloon. The balloon was as big as her head. She held tightly to the string. But then she accidentally let go! The balloon flew into the air. Lotte watched as it flew higher and higher. The balloon flew over the houses. It flew over the trees. Finally it disappeared behind a cloud. Lotte was a little sad, but then her father promised to buy a new balloon.",
            "image_query": "red balloon flying sky",
            "character": "🎈"
        },
        {
            "id": 8,
            "group": 1,
            "title": "De Sneeuwpop",
            "titleEn": "The Snowman",
            "content_nl": "Het had gesneeuwd! Overal lag een dikke witte deken. Tim en Lisa gingen naar buiten. Ze rolden drie sneeuwballen. Een grote, een middelgrote en een kleine. Ze stapelden ze op elkaar. Ze gaven de sneeuwpop een wortel als neus. Twee steentjes werden zijn ogen. Een oude hoed en een sjaal maakten hem af. De sneeuwpop glimlachte naar hen. De volgende dag was de zon gaan schijnen. De sneeuwpop begon te smelten. Tim en Lisa waren verdrietig, maar ze wisten dat ze volgend jaar weer een sneeuwpop konden maken.",
            "content_en": "It had snowed! Everywhere lay a thick white blanket. Tim and Lisa went outside. They rolled three snowballs. A big one, a medium one and a small one. They stacked them on top of each other. They gave the snowman a carrot for a nose. Two stones became his eyes. An old hat and a scarf finished him. The snowman smiled at them. The next day the sun came out. The snowman began to melt. Tim and Lisa were sad, but they knew they could make another snowman next year.",
            "image_query": "snowman winter children",
            "character": "⛄"
        },
        {
            "id": 9,
            "group": 1,

    const storiesList      = document.getElementById('storiesList');
    const storyTitle       = document.getElementById('storyTitle');
    const dutchText        = document.getElementById('dutchText');
    const englishText      = document.getElementById('englishText');
    const stopButton       = document.getElementById('stopButton');
    const speedSlider      = document.getElementById('speedSlider');
    const speedValue       = document.getElementById('speedValue');
    const languageTabs     = document.querySelectorAll('.language-tab');
    const languageContents = document.querySelectorAll('.language-content');
    const storyCharacter   = document.getElementById('storyCharacter');

    const synth   = window.speechSynthesis;
    let utterance = null;
    let isPlaying = false;
    let currentStory = null;

    // ── Sidebar (mobile drawer) ──
    function openSidebar() {
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('drawer-overlay').classList.add('on');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('drawer-overlay').classList.remove('on');
    }

    // ── LocalStorage ──
    function saveCurrentStory(story) {
      try { localStorage.setItem(STORAGE_KEYS.CURRENT_STORY, JSON.stringify(story)); } catch {}
    }
    function loadCurrentStory() {
      try {
        const s = localStorage.getItem(STORAGE_KEYS.CURRENT_STORY);
        return s ? JSON.parse(s) : null;
      } catch { return null; }
    }
    function saveReadingProgress(id, pct) {
      try { localStorage.setItem(STORAGE_KEYS.READING_PROGRESS, JSON.stringify({ storyId: id, progress: pct, timestamp: new Date().toISOString() })); } catch {}
    }
    function loadReadingProgress(id) {
      try {
        const d = localStorage.getItem(STORAGE_KEYS.READING_PROGRESS);
        if (d) { const p = JSON.parse(d); if (p.storyId === id) return p.progress; }
      } catch {}
      return 0;
    }
    function saveSpeechSettings(s) {
      try { localStorage.setItem(STORAGE_KEYS.SPEECH_SETTINGS, JSON.stringify(s)); } catch {}
    }
    function loadSpeechSettings() {
      try {
        const s = localStorage.getItem(STORAGE_KEYS.SPEECH_SETTINGS);
        if (s) return JSON.parse(s);
      } catch {}
      return { rate: 1, pitch: 1.2, volume: 0.8 };
    }

    // ── Dutch voice ──
    function getDutchVoice() {
      const voices = window.speechSynthesis.getVoices();
      return voices.find(v => v.name.includes('Microsoft Colette Online') && v.lang === 'nl-NL')
          || voices.find(v => v.name.includes('Google Nederlands') && v.lang === 'nl-NL')
          || voices.find(v => v.lang === 'nl-NL')
          || null;
    }

    // ── Speech ──
    function setupSpeech() {
      if (!currentStory) return;
      const settings = loadSpeechSettings();
      utterance = new SpeechSynthesisUtterance(currentStory.content_nl);
      utterance.voice  = getDutchVoice();
      utterance.lang   = 'nl-NL';
      utterance.rate   = settings.rate;
      utterance.pitch  = settings.pitch;
      utterance.volume = settings.volume;
      utterance.onstart = () => {
        isPlaying = true;
        playButton.innerHTML = '<i class="fas fa-pause"></i>';
      };
      utterance.onend = () => {
        isPlaying = false;
        playButton.innerHTML = '<i class="fas fa-play"></i>';
        saveReadingProgress(currentStory.id, 100);
      };
      utterance.onerror = () => {
        isPlaying = false;
        playButton.innerHTML = '<i class="fas fa-play"></i>';
      };
      utterance.onboundary = (e) => {
        if (e.name === 'sentence') {
          const pct = (e.charIndex / currentStory.content_nl.length) * 100;
          saveReadingProgress(currentStory.id, pct);
        }
      };
    }

    // ── Load story ──
    function loadStory(story) {
      currentStory = story;
      saveCurrentStory(story);
      storyTitle.textContent   = `${story.title} / ${story.titleEn}`;
      dutchText.textContent    = story.content_nl;
      englishText.textContent  = story.content_en;
      storyCharacter.textContent = story.character;
      updateBackgroundImage(story.image_query);
      if (isPlaying) { synth.cancel(); isPlaying = false; playButton.innerHTML = '<i class="fas fa-play"></i>'; }
      setupSpeech();
      // Ensure Dutch tab is shown when loading a new story
      switchLanguage('dutch');
    }

    // ── Background ──
    function updateBackgroundImage(query) {
      const map = {
        'cute kitten tree adventure':  'https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&w=1350&q=80',
        'animal forest picnic':        'https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&w=1350&q=80',
        'frog rain dance animals':     'https://images.unsplash.com/photo-1551103782-8ab07afd45c1?auto=format&fit=crop&w=1350&q=80',
        'little lamb farm':            'https://images.unsplash.com/photo-1504595403659-9088ce801e29?auto=format&fit=crop&w=1350&q=80',
        'little train mountain':       'https://images.unsplash.com/photo-1605493666700-0716438e655c?auto=format&fit=crop&q=80&w=1170'
      };
      const url = map[query] || 'https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=1350&q=80';
      backgroundImage.style.backgroundImage = `url('${url}')`;
    }

    // ── Playback ──
    function togglePlayback() {
      if (!currentStory) { alert('Kies eerst een verhaal!'); return; }
      if (isPlaying) {
        synth.pause();
        isPlaying = false;
        playButton.innerHTML = '<i class="fas fa-play"></i>';
      } else {
        if (synth.speaking && synth.paused) {
          synth.resume();
        } else {
          setupSpeech();
          synth.speak(utterance);
        }
        isPlaying = true;
        playButton.innerHTML = '<i class="fas fa-pause"></i>';
      }
    }

    // ── Speed ──
    function updateSpeed() {
      const speed = speedSlider.value;
      speedValue.textContent = `${speed}×`;
      if (utterance) {
        utterance.rate = parseFloat(speed);
        const s = loadSpeechSettings(); s.rate = parseFloat(speed); saveSpeechSettings(s);
      }
      if (isPlaying) { synth.cancel(); synth.speak(utterance); }
    }

    // ── Language switch ──
    function switchLanguage(lang) {
      languageTabs.forEach(t => t.classList.toggle('active', t.getAttribute('data-lang') === lang));
      languageContents.forEach(c => c.classList.toggle('active', c.id === `${lang}Content`));
    }

    // ── Populate story list ──
    function loadStoriesList() {
      storiesList.innerHTML = '';
      const groups = {};
      stories.forEach(s => { (groups[s.group] ??= []).push(s); });
      const groupNames = { 1: '🌱 Beginners', 2: '🌿 Avontuur', 3: '✨ Magie', 4: '💫 Dromen', 5: '🌟 Wijsheid' };
      Object.entries(groups).forEach(([grp, items]) => {
        const lbl = document.createElement('li');
        lbl.className = 'sb-group-label';
        lbl.textContent = groupNames[grp] || `Groep ${grp}`;
        storiesList.appendChild(lbl);
        items.forEach(story => {
          const li = document.createElement('li');
          li.className = 'story-item';
          li.innerHTML = `<div class="story-item-title">${story.character} ${story.title}</div><div class="story-item-sub">${story.titleEn}</div>`;
          li.addEventListener('click', () => {
            document.querySelectorAll('.story-item').forEach(el => el.classList.remove('active'));
            li.classList.add('active');
            loadStory(story);
            closeSidebar();
          });
          storiesList.appendChild(li);
        });
      });
    }

    // ── Init ──
    function init() {
      loadStoriesList();
      const saved = loadCurrentStory();
      if (saved) {
        const story = stories.find(s => s.id === saved.id);
        if (story) {
          loadStory(story);
          document.querySelectorAll('.story-item').forEach(el => {
            el.classList.toggle('active', parseInt(el.querySelector('.story-item-title')?.textContent?.match(/\d+/)?.[0]) === story.id);
          });
        }
      }
      const settings = loadSpeechSettings();
      speedSlider.value = settings.rate;
      speedValue.textContent = `${settings.rate}×`;

      // Event listeners
      playButton.addEventListener('click', togglePlayback);
      speedSlider.addEventListener('input', updateSpeed);
      languageTabs.forEach(tab => tab.addEventListener('click', () => switchLanguage(tab.getAttribute('data-lang'))));
    }

    window.addEventListener('load', init);
    window.addEventListener('beforeunload', () => { if (currentStory) saveCurrentStory(currentStory); });
  </script>
</body>
</html>
