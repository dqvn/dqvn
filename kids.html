<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧒 Leer Nederlands – Kids</title>
  <link rel="stylesheet" href="assets/css/dlg.css">
  <link rel="stylesheet" href="assets/css/kids.css">
  <link rel="stylesheet" href="assets/css/sync.css">
</head>
<body>

  <!-- Mobile top bar -->
  <div id="mob-bar">
    <button class="mob-ico" id="mob-menu-btn" aria-label="Open lessen">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <span id="mob-cur">🧒 Kies een les</span>
  </div>
  <div id="drawer-overlay"></div>

  <!-- Sidebar -->
  <nav id="sidebar" class="sidebar-dark">
    <div class="sb-drag-handle"></div>
    <div class="sb-logo">
      <h1>🧒 Leer Nederlands</h1>
      <p>Kids Vocabulary Practice</p>
    </div>
    <!-- Cloud sync (populated by sync.js) -->
    <div id="sync-section"></div>
    <div id="dlg-list">
      <div class="sb-load"><div class="spin"></div> Laden…</div>
    </div>
    <div id="speed-section">
      <div class="sb-ctrl-label">🐢 Speed</div>
      <div class="speed-row">
        <input type="range" id="speed-slider" min="0.3" max="1.2" step="0.05" value="0.5">
        <span id="speed-value">0.5×</span>
      </div>
    </div>
    <div id="voice-section">
      <div id="tts-name"></div>
      <select id="tts-voice-select"><option disabled>Laden…</option></select>
    </div>
    <div id="sb-back-link">
      <a href="/dqvn/">← Main Menu</a>
    </div>
    <footer id="app-footer">
      <div class="ft-avatar">QN</div>
      <div class="ft-info">
        <span class="ft-name">Quang, Nguyen Dang</span>
        <a class="ft-email" href="mailto:dqvn2002@gmail.com">dqvn2002@gmail.com</a>
      </div>
      <span class="ft-year" id="year"></span>
    </footer>
  </nav>

  <!-- Content area -->
  <div id="content">
    <div id="main">

      <!-- Welcome screen (shown before a lesson is loaded) -->
      <div id="welcome">
        <div class="flag">🧒</div>
        <h2>Kies een les</h2>
        <p>Select a lesson from the menu to start practising Dutch vocabulary.</p>
      </div>

      <!-- Lesson view (hidden by dlg.css until a lesson loads) -->
      <div id="view">
        <div class="card">
          <h1 id="lesson-title">…</h1>
          <p id="lesson-subtitle"></p>
          <div class="vocab-grid" id="vocab-grid"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="assets/js/kidsscript.js"></script>
  <script src="assets/js/sync.js" defer></script>
</body>
</html>
