<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎧 Podcast Luisteren – Nederlands</title>
  <link rel="icon" href="assets/img/dutch.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/sync.css">
  <link rel="stylesheet" href="assets/css/podcast.css">
</head>
<body>

  <!-- ── Top nav ── -->
  <nav id="top-nav">
    <a href="index.html" class="nav-back">← Terug</a>
    <span class="nav-title">🎧 Podcast Luisteren</span>
    <div id="fs-ctrl">
      <button class="fs-btn" id="fs-down" onclick="changeFontSize(-1)" title="Kleinere tekst">A−</button>
      <button class="fs-btn" id="fs-up"   onclick="changeFontSize(1)"  title="Grotere tekst">A+</button>
    </div>
    <button id="refresh-btn" onclick="refreshFeed()" title="Ververs afleveringen">
      <svg id="refresh-ico" width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-15 6.7L3 16M3 21v-5h5"/>
      </svg>
    </button>
    <button id="sync-nav-btn" onclick="toggleSyncDrawer()" title="Sync &amp; Account">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </button>
  </nav>

  <div id="app">

    <!-- ── Progress header ── -->
    <div id="feed-header">
      <div class="feed-progress-row">
        <span class="feed-stat">🎧&nbsp;<b id="stat-listened">0</b>&nbsp;beluisterd</span>
        <span class="feed-stat">📻&nbsp;<b id="stat-total">—</b>&nbsp;afleveringen</span>
        <div class="feed-prog-track">
          <div class="feed-prog-fill" id="prog-fill"></div>
        </div>
        <span class="feed-pct" id="stat-pct">0%</span>
      </div>
      <div class="feed-meta-row">
        <span class="feed-src">
          Bron: <a href="https://podcast.npo.nl/podcast/met-het-oog-op-morgen" target="_blank" rel="noopener">Met het Oog op Morgen</a>
          — NPO Radio 1 · Luister naar actueel nieuws in helder Nederlands.
        </span>
        <span class="feed-updated" id="feed-updated"></span>
      </div>
    </div>

    <!-- ── Loading / error state ── -->
    <div id="feed-status">
      <span class="status-ico spinning">⟳</span>
      <div class="status-txt">Afleveringen laden…</div>
    </div>

    <!-- ── Episode list ── -->
    <div id="episode-list"></div>

  </div><!-- #app -->

  <!-- ── Sync drawer ── -->
  <div id="sync-backdrop" onclick="closeSyncDrawer()"></div>
  <div id="sync-drawer">
    <div class="sdrawer-hd">
      <span class="sdrawer-title">☁️ Sync &amp; Account</span>
      <button class="sdrawer-close" onclick="closeSyncDrawer()">×</button>
    </div>
    <div class="sdrawer-body sidebar-dark">
      <div id="sync-section"></div>
    </div>
  </div>

  <div id="_toast"></div>

  <!-- Word-action popup -->
  <div id="word-popup">
    <div class="wp-word" id="wp-word"></div>
    <div class="wp-trans" id="wp-trans"></div>
    <div class="wp-btns">
      <button class="wp-btn" onclick="wordSpeak()">🔊 Horen</button>
      <button class="wp-btn" id="wp-copy-btn" onclick="wordCopy()">📋 Kopiëren</button>
      <button class="wp-btn wp-btn-close" onclick="closeWordPopup()">✕</button>
    </div>
  </div>

  <script src="assets/js/sync.js"></script>
  <script src="assets/js/podcast.js" defer></script>

</body>
</html>
