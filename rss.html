<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📰 Nieuws Lezen – Nederlands</title>
  <link rel="icon" href="assets/img/dutch.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/sync.css">

  <style>
  /* ════════════════════════════════════════════════
     RSS NEWS READER — Dutch learning tool
     Dark theme matching wheel.css variables
  ════════════════════════════════════════════════ */
  :root {
    --bg:     #0f172a;
    --bg2:    #1e293b;
    --bg3:    #273549;
    --orange: #e85d04;
    --ord:    #c44f00;
    --accent: #ffd166;
    --teal:   #06d6a0;
    --red:    #ef476f;
    --purple: #9b5de5;
    --blue:   #3b82f6;
    --text:   #f1f5f9;
    --muted:  rgba(241,245,249,.52);
    --card:   rgba(255,255,255,.05);
    --border: rgba(255,255,255,.1);
    --r:      16px;
    --nav-h:  56px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Top nav ─────────────────────────────────── */
  #top-nav {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--nav-h);
    background: rgba(15,23,42,.96);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    padding: 0 16px; z-index: 200;
  }
  .nav-back {
    color: var(--accent); text-decoration: none;
    font-weight: 800; font-size: .9rem;
    transition: opacity .2s; flex-shrink: 0;
  }
  .nav-back:hover { opacity: .7; }
  .nav-title {
    flex: 1; text-align: center;
    font-size: 1.05rem; font-weight: 900;
  }

  /* Refresh icon button */
  #refresh-btn {
    width: 36px; height: 36px; flex-shrink: 0;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,.16);
    background: rgba(255,255,255,.07);
    color: var(--muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0; transition: all .18s;
  }
  #refresh-btn:hover { background: rgba(255,255,255,.14); border-color: rgba(255,255,255,.32); color: var(--text); }
  #refresh-btn.spinning svg { animation: navSpin .8s linear infinite; }
  @keyframes navSpin { to { transform: rotate(360deg); } }

  /* Sync nav button */
  #sync-nav-btn {
    width: 36px; height: 36px; flex-shrink: 0;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,.16);
    background: rgba(255,255,255,.07);
    color: var(--muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; padding: 0;
    transition: border-color .2s, background .2s;
  }
  #sync-nav-btn:hover { background: rgba(255,255,255,.14); border-color: rgba(255,255,255,.32); }
  #sync-nav-btn img { width: 100%; height: 100%; object-fit: cover; }

  /* ── App body ────────────────────────────────── */
  #app {
    padding-top: var(--nav-h);
    padding-bottom: 48px;
  }

  /* ── Feed header / progress strip ───────────── */
  #feed-header {
    max-width: 780px; margin: 0 auto;
    padding: 16px 16px 4px;
    display: flex; flex-direction: column; gap: 10px;
  }

  .feed-progress-row {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .feed-stat {
    font-size: .82rem; font-weight: 700; color: var(--muted);
    white-space: nowrap;
  }
  .feed-stat b { color: var(--text); }
  .feed-prog-track {
    flex: 1; min-width: 60px; height: 6px;
    background: rgba(255,255,255,.08); border-radius: 999px; overflow: hidden;
  }
  .feed-prog-fill {
    height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, var(--teal), #059669);
    transition: width .6s ease;
    width: 0%;
  }
  .feed-pct { font-size: .78rem; font-weight: 800; color: var(--teal); }

  .feed-meta-row {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .feed-src {
    font-size: .72rem; color: var(--muted); line-height: 1.4;
  }
  .feed-src a { color: var(--accent); text-decoration: none; }
  .feed-src a:hover { text-decoration: underline; }
  .feed-updated { font-size: .7rem; color: rgba(241,245,249,.3); margin-left: auto; }

  /* ── Article list ────────────────────────────── */
  #article-list {
    max-width: 780px; margin: 12px auto 0;
    padding: 0 16px;
    display: flex; flex-direction: column; gap: 10px;
  }

  /* ── Article card ────────────────────────────── */
  .art-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
    transition: border-color .18s, background .18s, opacity .28s;
  }
  .art-card:hover { background: rgba(255,255,255,.07); border-color: rgba(255,255,255,.18); }
  .art-card.is-read { opacity: .44; }
  .art-card.is-read:hover { opacity: .76; }

  /* Card header (always visible, clickable) */
  .art-head {
    padding: 13px 16px 11px;
    cursor: pointer; user-select: none;
    display: flex; flex-direction: column; gap: 7px;
  }

  .art-toprow {
    display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
  }
  .art-cat {
    font-size: .6rem; font-weight: 900; letter-spacing: .6px;
    text-transform: uppercase;
    padding: 3px 9px; border-radius: 999px;
    color: white; flex-shrink: 0;
  }
  .art-time { font-size: .71rem; color: var(--muted); }
  .art-read-badge {
    font-size: .68rem; font-weight: 800;
    color: var(--teal); margin-left: auto; flex-shrink: 0;
  }

  .art-title {
    font-size: .97rem; font-weight: 800; line-height: 1.35;
    color: var(--text); display: -webkit-box;
    -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .art-card.expanded .art-title { -webkit-line-clamp: unset; }

  .art-chevron {
    align-self: flex-end; color: var(--muted);
    font-size: .7rem; transition: transform .22s;
  }
  .art-card.expanded .art-chevron { transform: rotate(180deg); }

  /* Card body (collapsed by default, expand on click) */
  .art-body {
    overflow: hidden; max-height: 0;
    transition: max-height .35s cubic-bezier(.4,0,.2,1);
  }
  .art-card.expanded .art-body { max-height: 360px; }

  .art-body-inner {
    border-top: 1px solid var(--border);
    padding: 13px 16px 15px;
    display: flex; flex-direction: column; gap: 11px;
  }
  .art-desc {
    font-size: .88rem; line-height: 1.65;
    color: rgba(241,245,249,.7);
  }

  .art-actions {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .art-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 8px 14px; border-radius: 11px;
    border: 1.5px solid var(--border);
    background: var(--card); color: var(--muted);
    font-family: inherit; font-size: .78rem; font-weight: 800;
    cursor: pointer; text-decoration: none;
    transition: all .18s; white-space: nowrap;
  }
  .art-btn:hover { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.25); color: var(--text); }

  .art-btn-open {
    background: rgba(232,93,4,.1);
    border-color: rgba(232,93,4,.3);
    color: var(--orange);
  }
  .art-btn-open:hover { background: rgba(232,93,4,.22); border-color: var(--orange); }

  .art-btn-done {
    background: rgba(6,214,160,.1);
    border-color: rgba(6,214,160,.28);
    color: var(--teal);
  }
  .art-btn-done:hover { background: rgba(6,214,160,.2); border-color: var(--teal); }

  /* ── Feed status (loading/error) ─────────────── */
  #feed-status {
    max-width: 780px; margin: 28px auto 0;
    padding: 0 16px; text-align: center;
  }
  .status-ico { font-size: 1.5rem; display: block; margin-bottom: 8px; }
  .status-ico.spinning { animation: navSpin .9s linear infinite; display: inline-block; }
  .status-txt { font-size: .9rem; color: var(--muted); }
  .status-retry {
    margin-top: 12px; display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px; border-radius: 12px;
    border: 1.5px solid var(--border); background: var(--card);
    color: var(--muted); font-family: inherit; font-size: .82rem;
    font-weight: 800; cursor: pointer; transition: all .18s;
  }
  .status-retry:hover { background: rgba(255,255,255,.1); color: var(--text); }

  /* ── Sync drawer (same pattern as wheel.html) ── */
  #sync-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.55);
    backdrop-filter: blur(5px);
    z-index: 300; opacity: 0; pointer-events: none;
    transition: opacity .28s ease;
  }
  #sync-backdrop.open { opacity: 1; pointer-events: auto; }

  #sync-drawer {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 300px; max-width: 92vw;
    background: var(--bg2); border-left: 1px solid var(--border);
    z-index: 310; display: flex; flex-direction: column;
    transform: translateX(105%);
    transition: transform .32s cubic-bezier(.4,0,.2,1);
    box-shadow: -16px 0 56px rgba(0,0,0,.55);
  }
  #sync-drawer.open { transform: translateX(0); }

  .sdrawer-hd {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; height: var(--nav-h); flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .sdrawer-title { font-size: .92rem; font-weight: 800; }
  .sdrawer-close {
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: 50%; color: var(--text);
    width: 32px; height: 32px; font-size: 1.1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all .18s;
  }
  .sdrawer-close:hover { background: rgba(239,71,111,.2); border-color: var(--red); color: var(--red); }
  .sdrawer-body { flex: 1; overflow-y: auto; }

  /* ── Toast ───────────────────────────────────── */
  #_toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg2); color: var(--text);
    padding: 11px 22px; border-radius: 24px;
    font-weight: 700; font-size: .88rem;
    border: 1.5px solid var(--border);
    opacity: 0; transition: all .32s;
    z-index: 9000; white-space: nowrap; pointer-events: none;
  }
  #_toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── Responsive ──────────────────────────────── */
  @media (max-width: 520px) {
    .art-title { font-size: .9rem; }
    .art-head  { padding: 11px 13px 10px; }
    .art-body-inner { padding: 11px 13px 13px; }
    .art-btn   { padding: 7px 12px; font-size: .74rem; }
  }
  </style>
</head>
<body>

  <!-- ── Top nav ── -->
  <nav id="top-nav">
    <a href="index.html" class="nav-back">← Terug</a>
    <span class="nav-title">📰 Nieuws Lezen</span>
    <button id="refresh-btn" onclick="refreshFeed()" title="Ververs nieuws">
      <svg id="refresh-ico" width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-15 6.7L3 16M3 21v-5h5"/>
      </svg>
    </button>
    <button id="sync-nav-btn" onclick="toggleSyncDrawer()" title="Sync &amp; Account">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </button>
  </nav>

  <div id="app">

    <!-- ── Progress header ── -->
    <div id="feed-header">
      <div class="feed-progress-row">
        <span class="feed-stat">✓&nbsp;<b id="stat-read">0</b>&nbsp;gelezen</span>
        <span class="feed-stat">📰&nbsp;<b id="stat-total">—</b>&nbsp;artikelen</span>
        <div class="feed-prog-track">
          <div class="feed-prog-fill" id="prog-fill"></div>
        </div>
        <span class="feed-pct" id="stat-pct">0%</span>
      </div>
      <div class="feed-meta-row">
        <span class="feed-src">
          Bron: <a href="https://www.nu.nl" target="_blank" rel="noopener">nu.nl</a>
          — Lees echt Nederlands nieuws en verbeter je leesvaardigheid.
        </span>
        <span class="feed-updated" id="feed-updated"></span>
      </div>
    </div>

    <!-- ── Loading / error state ── -->
    <div id="feed-status">
      <span class="status-ico spinning">⟳</span>
      <div class="status-txt">Nieuws laden…</div>
    </div>

    <!-- ── Article list ── -->
    <div id="article-list"></div>

  </div><!-- #app -->

  <!-- ── Sync drawer ── -->
  <div id="sync-backdrop" onclick="closeSyncDrawer()"></div>
  <div id="sync-drawer">
    <div class="sdrawer-hd">
      <span class="sdrawer-title">☁️ Sync &amp; Account</span>
      <button class="sdrawer-close" onclick="closeSyncDrawer()">×</button>
    </div>
    <div class="sdrawer-body sidebar-dark">
      <div id="sync-section"></div>
    </div>
  </div>

  <div id="_toast"></div>

  <script src="assets/js/sync.js"></script>
  <script>
  'use strict';

  /* ── Constants ───────────────────────────────────────────── */
  const RSS_URL   = 'https://www.nu.nl/rss';
  const PROXY_URL = 'https://api.allorigins.win/get?url=';
  const CACHE_KEY = 'nl_rss_cache_v1';
  const READ_KEY  = 'nl_rss_v1';
  const CACHE_TTL = 15 * 60_000;  // 15 min before background refresh

  /* ── State ───────────────────────────────────────────────── */
  let articles  = [];
  let readGuids = new Set();
  let expanded  = new Set();

  /* ── Storage helpers ─────────────────────────────────────── */
  function readJSON(k, fb) {
    try { return JSON.parse(localStorage.getItem(k)) ?? fb; } catch { return fb; }
  }

  function loadReadState() {
    const d = readJSON(READ_KEY, { read: [], total: 0 });
    readGuids = new Set(Array.isArray(d.read) ? d.read : []);
  }

  function saveReadState() {
    const prev  = readJSON(READ_KEY, { total: 0 });
    const arr   = [...readGuids];
    const total = Math.max(prev.total || 0, arr.length);
    try { localStorage.setItem(READ_KEY, JSON.stringify({ read: arr, total })); } catch {}
  }

  function markOneRead(id) {
    if (readGuids.has(id)) return false;
    readGuids.add(id);
    const prev  = readJSON(READ_KEY, { total: 0 });
    const total = (prev.total || 0) + 1;
    try {
      localStorage.setItem(READ_KEY, JSON.stringify({ read: [...readGuids], total }));
    } catch {}
    return true;
  }

  /* ── Article ID ──────────────────────────────────────────── */
  function artId(a) { return a.guid || a.link || a.title || ''; }

  /* ── Strip HTML ──────────────────────────────────────────── */
  function stripHTML(html) {
    const d = document.createElement('div');
    d.innerHTML = html || '';
    return (d.textContent || '').replace(/\s+/g, ' ').trim();
  }

  /* ── HTML escape ─────────────────────────────────────────── */
  function escH(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  /* ── Relative time ───────────────────────────────────────── */
  function relTime(dateStr) {
    const d = new Date(dateStr);
    if (isNaN(d)) return '';
    const diff = Date.now() - d.getTime();
    if (diff < 60_000)    return 'zojuist';
    if (diff < 3_600_000) return Math.floor(diff / 60_000)    + ' min geleden';
    if (diff < 86_400_000) return Math.floor(diff / 3_600_000) + ' uur geleden';
    return d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
  }

  /* ── Category color map ──────────────────────────────────── */
  const CAT_COLORS = {
    sport:         '#06d6a0',
    economie:      '#f59e0b',
    binnenland:    '#e85d04',
    buitenland:    '#9b5de5',
    entertainment: '#ef476f',
    film:          '#ec4899',
    muziek:        '#a855f7',
    tech:          '#3b82f6',
    gezondheid:    '#22c55e',
    wetenschap:    '#60a5fa',
    natuur:        '#10b981',
    reizen:        '#14b8a6',
  };

  function catColor(cat) {
    if (!cat) return '#64748b';
    const key = cat.toLowerCase();
    for (const [k, v] of Object.entries(CAT_COLORS)) {
      if (key.includes(k)) return v;
    }
    return '#64748b';
  }

  /* ── Parse RSS XML → article objects ────────────────────── */
  function parseRSSXML(xmlStr) {
    const parser = new DOMParser();
    const xml    = parser.parseFromString(xmlStr, 'text/xml');
    if (xml.querySelector('parsererror')) throw new Error('XML parse error');

    const text = (el, tag) => el.querySelector(tag)?.textContent?.trim() ?? '';

    return [...xml.querySelectorAll('channel > item')].slice(0, 30).map(item => {
      /* <link> in RSS 2.0 is a text node sibling, not element content in all parsers */
      let link = text(item, 'link');
      if (!link) {
        const linkEl = item.querySelector('link');
        link = linkEl?.nextSibling?.nodeValue?.trim()
            || linkEl?.getAttribute('href')
            || '';
      }
      const guid = text(item, 'guid') || link;
      const cats = [...item.querySelectorAll('category')]
                     .map(c => c.textContent.trim()).filter(Boolean);

      return {
        title:       text(item, 'title'),
        link:        link || guid,
        description: text(item, 'description'),
        pubDate:     text(item, 'pubDate'),
        guid,
        categories:  cats,
      };
    });
  }

  /* ── Fetch RSS feed ──────────────────────────────────────── */
  async function fetchFeed(silent = false) {
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');

    if (!silent) {
      const st = document.getElementById('feed-status');
      st.style.display = '';
      st.innerHTML = `<span class="status-ico spinning">⟳</span><div class="status-txt">Nieuws laden…</div>`;
    }

    try {
      const res  = await fetch(PROXY_URL + encodeURIComponent(RSS_URL));
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      if (!json.contents) throw new Error('Empty proxy response');

      const items = parseRSSXML(json.contents);
      if (!items.length) throw new Error('No items in feed');

      articles = items;
      try {
        localStorage.setItem(CACHE_KEY, JSON.stringify({ items: articles, at: Date.now() }));
      } catch {}

      render();
      document.getElementById('feed-status').style.display = 'none';
      updateFeedTimestamp();
    } catch (err) {
      if (!silent) {
        document.getElementById('feed-status').innerHTML =
          `<span class="status-ico">⚠️</span>
           <div class="status-txt">Kan nieuws niet laden.<br>Controleer je verbinding.</div>
           <button class="status-retry" onclick="refreshFeed()">↺ &nbsp;Probeer opnieuw</button>`;
      } else if (!articles.length) {
        document.getElementById('feed-status').innerHTML =
          `<span class="status-ico">⚠️</span>
           <div class="status-txt">Geen nieuws beschikbaar.</div>
           <button class="status-retry" onclick="refreshFeed()">↺ &nbsp;Probeer opnieuw</button>`;
      }
    } finally {
      btn.classList.remove('spinning');
    }
  }

  function refreshFeed() { fetchFeed(false); }

  function updateFeedTimestamp() {
    const el = document.getElementById('feed-updated');
    if (el) el.textContent = 'Bijgewerkt ' + new Date().toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
  }

  /* ── Render all articles ─────────────────────────────────── */
  function render() {
    updateProgress();
    const list = document.getElementById('article-list');
    list.innerHTML = articles.map((a, i) => cardHTML(a, i)).join('');
    updateNavAvatar();
  }

  function updateProgress() {
    const readInFeed = articles.filter(a => readGuids.has(artId(a))).length;
    const total      = articles.length;
    const pct        = total ? Math.min(100, Math.round(readInFeed / total * 100)) : 0;

    document.getElementById('stat-read').textContent  = readInFeed;
    document.getElementById('stat-total').textContent = total || '—';
    document.getElementById('stat-pct').textContent   = pct + '%';
    document.getElementById('prog-fill').style.width  = pct + '%';
  }

  /* ── Article card HTML ───────────────────────────────────── */
  function cardHTML(a, i) {
    const id     = artId(a);
    const isRead = readGuids.has(id);
    const isExp  = expanded.has(i);

    /* Category: nu.nl uses paths like "sport/voetbal" — take last segment */
    const rawCat = (a.categories?.[0] || '');
    const cat    = rawCat.split('/').filter(Boolean).pop() || '';
    const color  = catColor(cat);

    const desc   = stripHTML(a.description || a.content || '').slice(0, 280);
    const time   = relTime(a.pubDate);
    const link   = escH(a.link || '#');

    return `
      <div class="art-card${isRead ? ' is-read' : ''}${isExp ? ' expanded' : ''}" id="ac-${i}">
        <div class="art-head" onclick="toggleExpand(${i})">
          <div class="art-toprow">
            ${cat ? `<span class="art-cat" style="background:${color}">${escH(cat)}</span>` : ''}
            ${time ? `<span class="art-time">${escH(time)}</span>` : ''}
            ${isRead ? `<span class="art-read-badge">✓ Gelezen</span>` : ''}
          </div>
          <h3 class="art-title">${escH(a.title || '')}</h3>
          <div class="art-chevron">▼</div>
        </div>
        <div class="art-body">
          <div class="art-body-inner">
            ${desc ? `<p class="art-desc">${escH(desc)}${desc.length >= 280 ? '…' : ''}</p>` : ''}
            <div class="art-actions">
              <button class="art-btn" onclick="speakArt(${i})" title="Hoor de tekst in het Nederlands">
                🔊 Voorlezen
              </button>
              <a class="art-btn art-btn-open"
                 href="${link}" target="_blank" rel="noopener"
                 onclick="handleOpen(event,${i})">
                ↗ Open artikel
              </a>
              <button class="art-btn${isRead ? ' art-btn-done' : ''}"
                      id="rbtn-${i}" onclick="toggleRead(${i})">
                ${isRead ? '✓ Gelezen' : '☐ Markeer gelezen'}
              </button>
            </div>
          </div>
        </div>
      </div>`;
  }

  /* ── Expand / collapse ───────────────────────────────────── */
  function toggleExpand(i) {
    const card = document.getElementById('ac-' + i);
    if (!card) return;
    if (expanded.has(i)) {
      expanded.delete(i);
      card.classList.remove('expanded');
    } else {
      expanded.add(i);
      card.classList.add('expanded');
    }
  }

  /* ── Mark read toggle ────────────────────────────────────── */
  function toggleRead(i) {
    const a = articles[i];
    if (!a) return;
    const id = artId(a);
    if (readGuids.has(id)) {
      readGuids.delete(id);
      saveReadState();
    } else {
      markOneRead(id);
    }
    // Re-render just this card and update progress
    const card = document.getElementById('ac-' + i);
    const isRead = readGuids.has(id);
    if (card) {
      card.classList.toggle('is-read', isRead);
      // Update read badge
      const toprow = card.querySelector('.art-toprow');
      const badge  = toprow?.querySelector('.art-read-badge');
      if (isRead && !badge) {
        toprow.insertAdjacentHTML('beforeend', `<span class="art-read-badge">✓ Gelezen</span>`);
      } else if (!isRead && badge) {
        badge.remove();
      }
      // Update button
      const btn = document.getElementById('rbtn-' + i);
      if (btn) {
        btn.textContent = isRead ? '✓ Gelezen' : '☐ Markeer gelezen';
        btn.classList.toggle('art-btn-done', isRead);
      }
    }
    // Keep card expanded after action
    if (!expanded.has(i)) {
      expanded.add(i);
      card?.classList.add('expanded');
    }
    updateProgress();
  }

  /* ── Auto-mark read when opening external link ───────────── */
  function handleOpen(e, i) {
    const a = articles[i];
    if (!a) return;
    const id = artId(a);
    if (!readGuids.has(id)) {
      markOneRead(id);
      const card = document.getElementById('ac-' + i);
      if (card) {
        card.classList.add('is-read');
        const toprow = card.querySelector('.art-toprow');
        if (toprow && !toprow.querySelector('.art-read-badge')) {
          toprow.insertAdjacentHTML('beforeend', `<span class="art-read-badge">✓ Gelezen</span>`);
        }
        const btn = document.getElementById('rbtn-' + i);
        if (btn) { btn.textContent = '✓ Gelezen'; btn.classList.add('art-btn-done'); }
      }
      updateProgress();
    }
  }

  /* ── TTS ─────────────────────────────────────────────────── */
  function speakArt(i) {
    const a = articles[i];
    if (!a) return;
    if (speechSynthesis.speaking) speechSynthesis.cancel();
    const text   = stripHTML(a.title + '. ' + (a.description || '')).slice(0, 500);
    const utter  = new SpeechSynthesisUtterance(text);
    utter.lang   = 'nl-NL';
    try {
      const rate = parseFloat(localStorage.getItem('nl_tts_rate') || '0.8');
      utter.rate = isNaN(rate) ? 0.8 : Math.min(1.5, Math.max(0.5, rate));
    } catch {}
    speechSynthesis.speak(utter);
  }

  /* ── Sync drawer ─────────────────────────────────────────── */
  function toggleSyncDrawer() {
    const open = document.getElementById('sync-drawer').classList.toggle('open');
    document.getElementById('sync-backdrop').classList.toggle('open', open);
  }
  function closeSyncDrawer() {
    document.getElementById('sync-drawer').classList.remove('open');
    document.getElementById('sync-backdrop').classList.remove('open');
  }

  /* ── Sync nav avatar ─────────────────────────────────────── */
  function updateNavAvatar() {
    const btn  = document.getElementById('sync-nav-btn');
    const user = readJSON('fc_sync_user', null);
    if (user?.picture) {
      btn.innerHTML = `<img src="${escH(user.picture)}" alt="">`;
    }
  }

  /* Called by sync.js after a successful cloud sync */
  function updateWordBadges() { updateNavAvatar(); }

  /* ── Toast ───────────────────────────────────────────────── */
  function toast(msg, dur = 2200) {
    const el = document.getElementById('_toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), dur);
  }

  /* ── Boot ────────────────────────────────────────────────── */
  async function init() {
    loadReadState();

    const cached = readJSON(CACHE_KEY, null);
    if (cached?.items?.length) {
      articles = cached.items;
      render();
      document.getElementById('feed-status').style.display = 'none';
      if (cached.at) {
        updateFeedTimestamp();
        if (Date.now() - cached.at > CACHE_TTL) fetchFeed(true);
      }
    } else {
      await fetchFeed(false);
    }
  }

  init();
  </script>

</body>
</html>
