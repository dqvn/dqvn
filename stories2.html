<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dutch Short Stories – Beginners</title>
  <link rel="icon" type="image/x-icon" href="assets/img/dutch.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:   #e85d04;
      --primary-d: #c44f00;
      --accent:    #ffd166;
      --teal:      #0891b2;
      --bg:        #1a1a2e;
      --sidebar-w: 300px;
      --bar-h:     68px;
      --radius:    14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: #f0f0f0;
      height: 100dvh;
      overflow: hidden;
      display: flex;
    }

    /* ── Background photo ── */
    #bg {
      position: fixed; inset: 0; z-index: 0;
      background-size: cover; background-position: center;
      transition: background-image .8s ease;
      filter: brightness(.45) saturate(1.1);
    }
    #bg::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to right, rgba(0,0,0,.7) 0%, rgba(0,0,0,.25) 60%, rgba(0,0,0,.1) 100%);
    }

    /* ── Sidebar ── */
    #sidebar {
      position: relative; z-index: 10;
      width: var(--sidebar-w);
      flex-shrink: 0;
      display: flex; flex-direction: column;
      background: rgba(10,10,24,.72);
      backdrop-filter: blur(18px);
      border-right: 1px solid rgba(255,255,255,.08);
      overflow: hidden;
    }

    .sb-top {
      padding: 14px 16px 0;
      flex-shrink: 0;
    }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,.55);
      text-decoration: none;
      font-size: .82rem; font-weight: 700;
      letter-spacing: .03em;
      padding: 6px 10px;
      border-radius: 8px;
      transition: all .2s;
    }
    .back-link:hover { color: var(--accent); background: rgba(255,255,255,.07); }

    .sb-header {
      padding: 18px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,.09);
      flex-shrink: 0;
    }
    .sb-header h1 {
      font-size: 1.25rem; font-weight: 800;
      color: #fff;
      display: flex; align-items: center; gap: 8px;
    }
    .sb-header p {
      font-size: .78rem; color: rgba(255,255,255,.45);
      margin-top: 3px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
    }

    .story-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
      padding: 10px 10px 10px;
    }
    .story-list::-webkit-scrollbar { width: 4px; }
    .story-list::-webkit-scrollbar-track { background: transparent; }
    .story-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 4px; }

    .story-list li a {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 11px 12px;
      border-radius: 10px;
      text-decoration: none;
      color: rgba(255,255,255,.70);
      font-size: .88rem; font-weight: 600;
      line-height: 1.35;
      transition: all .18s;
      cursor: pointer;
    }
    .story-list li a:hover { background: rgba(255,255,255,.07); color: #fff; }
    .story-list li a.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-d));
      color: #fff;
      box-shadow: 0 4px 14px rgba(232,93,4,.35);
    }
    .story-num {
      flex-shrink: 0;
      width: 22px; height: 22px;
      background: rgba(255,255,255,.12);
      border-radius: 50%;
      font-size: .72rem; font-weight: 800;
      display: grid; place-items: center;
      color: rgba(255,255,255,.7);
    }
    .story-list li a.active .story-num { background: rgba(255,255,255,.25); color: #fff; }

    /* ── Main content ── */
    #main {
      flex: 1;
      position: relative; z-index: 5;
      overflow-y: auto;
      padding: 36px 40px calc(var(--bar-h) + 24px);
    }
    #main::-webkit-scrollbar { width: 5px; }
    #main::-webkit-scrollbar-track { background: transparent; }
    #main::-webkit-scrollbar-thumb { background: rgba(255,255,255,.18); border-radius: 4px; }

    /* Welcome / placeholder */
    #welcome {
      height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; gap: 16px;
    }
    #welcome .w-icon { font-size: 4rem; }
    #welcome h2 { font-size: 1.6rem; font-weight: 800; color: #fff; }
    #welcome p { font-size: .95rem; color: rgba(255,255,255,.55); max-width: 380px; line-height: 1.6; }

    /* Story view */
    #story-view { display: none; max-width: 760px; }

    .story-meta {
      margin-bottom: 28px;
      animation: fadeUp .4s ease both;
    }
    .story-num-badge {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      font-size: .72rem; font-weight: 800;
      letter-spacing: .07em; text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .story-meta h1 {
      font-size: 2rem; font-weight: 800;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .story-meta p {
      font-size: .92rem; color: rgba(255,255,255,.6);
      font-style: italic; line-height: 1.5;
    }

    /* Story text card */
    .story-card {
      background: rgba(255,255,255,.09);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-bottom: 28px;
      animation: fadeUp .4s .08s ease both;
    }
    .story-card p {
      font-family: 'Lora', serif;
      font-size: 1.05rem;
      line-height: 1.9;
      color: rgba(255,255,255,.88);
      margin-bottom: 1.1em;
    }
    .story-card p:last-child { margin-bottom: 0; }

    /* Vocabulary */
    .section-title {
      font-size: .72rem; font-weight: 800;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }
    .vocab-section {
      margin-bottom: 24px;
      animation: fadeUp .4s .16s ease both;
    }
    .vocab-grid {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .vocab-card {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      padding: 8px 14px;
      display: flex; align-items: center; gap: 8px;
      font-size: .85rem;
    }
    .vocab-nl { font-weight: 700; color: #fff; }
    .vocab-sep { color: rgba(255,255,255,.25); }
    .vocab-en { color: rgba(255,255,255,.55); }

    /* Questions */
    .questions-section {
      animation: fadeUp .4s .22s ease both;
    }
    .questions-toggle {
      width: 100%;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: var(--radius);
      padding: 14px 18px;
      color: rgba(255,255,255,.8);
      font-family: 'Nunito', sans-serif;
      font-size: .9rem; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      transition: background .2s;
    }
    .questions-toggle:hover { background: rgba(255,255,255,.12); }
    .questions-toggle .chevron { transition: transform .25s; font-size: .7rem; }
    .questions-toggle.open .chevron { transform: rotate(180deg); }
    .questions-body {
      display: none;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      padding: 18px 20px;
    }
    .questions-body.open { display: block; }
    .questions-body ol {
      padding-left: 20px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .questions-body li {
      font-size: .92rem;
      color: rgba(255,255,255,.75);
      line-height: 1.5;
    }

    /* ── TTS Bottom bar ── */
    #tts-bar {
      position: fixed;
      bottom: 0; left: var(--sidebar-w); right: 0;
      height: var(--bar-h);
      z-index: 20;
      background: rgba(10,10,24,.88);
      backdrop-filter: blur(18px);
      border-top: 1px solid rgba(255,255,255,.09);
      display: flex; align-items: center; justify-content: center; gap: 12px;
      padding: 0 24px;
    }

    .tts-btn {
      background: rgba(255,255,255,.1);
      border: none; border-radius: 50%;
      width: 42px; height: 42px;
      cursor: pointer;
      font-size: 1.1rem;
      display: grid; place-items: center;
      color: rgba(255,255,255,.8);
      transition: all .18s;
    }
    .tts-btn:hover { background: rgba(255,255,255,.2); color: #fff; transform: scale(1.08); }
    .tts-btn:disabled { opacity: .3; cursor: default; transform: none; }

    #btn-play-tts {
      width: 50px; height: 50px;
      background: var(--primary);
      font-size: 1.2rem;
      color: #fff;
      box-shadow: 0 4px 16px rgba(232,93,4,.4);
    }
    #btn-play-tts:hover { background: var(--primary-d); transform: scale(1.08); }
    #btn-play-tts.playing { background: #0891b2; box-shadow: 0 4px 16px rgba(8,145,178,.4); }

    #btn-speed-tts {
      background: rgba(255,213,102,.15);
      border: 1px solid rgba(255,213,102,.3);
      border-radius: 20px;
      width: auto; padding: 0 14px;
      font-family: 'Nunito', sans-serif;
      font-size: .8rem; font-weight: 800;
      color: var(--accent);
      letter-spacing: .05em;
    }
    #btn-speed-tts:hover { background: rgba(255,213,102,.25); }

    .tts-label {
      font-size: .75rem; font-weight: 700;
      color: rgba(255,255,255,.35);
      letter-spacing: .06em; text-transform: uppercase;
      flex: 1;
    }
    .tts-label span { color: rgba(255,255,255,.6); }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Mobile ── */
    @media (max-width: 680px) {
      :root { --sidebar-w: 0px; }
      #sidebar { display: none; }
      #mob-header {
        display: flex; align-items: center; gap: 12px;
        position: fixed; top: 0; left: 0; right: 0;
        height: 52px; z-index: 30;
        background: rgba(10,10,24,.9);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255,255,255,.08);
        padding: 0 14px;
      }
      #main { padding: 70px 18px calc(var(--bar-h) + 16px); }
      #tts-bar { left: 0; }
      .story-meta h1 { font-size: 1.4rem; }
      .story-card { padding: 20px 18px; }
    }
    @media (min-width: 681px) {
      #mob-header { display: none; }
    }
  </style>
</head>
<body>

<div id="bg"></div>

<!-- Mobile header -->
<div id="mob-header">
  <a href="index.html" style="color:rgba(255,255,255,.55);text-decoration:none;font-size:.8rem;font-weight:700;">← Portaal</a>
  <span style="font-size:.9rem;font-weight:800;color:#fff;flex:1;text-align:center">📕 Verhalen</span>
  <button id="mob-menu-btn" style="background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer">☰</button>
</div>

<!-- Sidebar -->
<nav id="sidebar">
  <div class="sb-top">
    <a href="index.html" class="back-link">← Terug naar Portaal</a>
  </div>
  <div class="sb-header">
    <h1>📕 Verhalen</h1>
    <p>Beginners · 10 verhalen</p>
  </div>
  <ul class="story-list" id="story-list"></ul>
</nav>

<!-- Main -->
<main id="main">

  <div id="welcome">
    <div class="w-icon">📖</div>
    <h2>Kies een verhaal</h2>
    <p>Selecteer een verhaal uit het menu om te beginnen met lezen. Luister mee met de ingebouwde voorleesknop!</p>
  </div>

  <div id="story-view">
    <div class="story-meta">
      <div class="story-num-badge" id="sv-badge">Verhaal 1</div>
      <h1 id="sv-title"></h1>
      <p id="sv-subtitle"></p>
    </div>

    <div class="story-card" id="sv-paragraphs"></div>

    <div class="vocab-section">
      <div class="section-title">Woordenschat</div>
      <div class="vocab-grid" id="sv-vocab"></div>
    </div>

    <div class="questions-section">
      <button class="questions-toggle" id="q-toggle" onclick="toggleQuestions()">
        <span>Vragen</span>
        <span class="chevron">▼</span>
      </button>
      <div class="questions-body" id="q-body">
        <ol id="sv-questions"></ol>
      </div>
    </div>
  </div>

</main>

<!-- TTS Bottom bar -->
<div id="tts-bar">
  <div class="tts-label">🔊 <span id="tts-status">Kies een verhaal</span></div>
  <button class="tts-btn" id="btn-restart-tts" title="Herstart" disabled>⟲</button>
  <button class="tts-btn" id="btn-play-tts" title="Afspelen / Pauzeren" disabled>▶</button>
  <button class="tts-btn" id="btn-stop-tts" title="Stop" disabled>■</button>
  <button class="tts-btn" id="btn-speed-tts" title="Snelheid">0.8×</button>
</div>

<script>
  const DATA_URL = 'data/stories/beginners.json';
  const SPEEDS = [0.8, 1.0, 1.25, 1.5, 0.6];
  let stories = [];
  let current = null;
  let speedIdx = 0;
  let utterance = null;
  let isPlaying = false;

  // ── Load data ──
  fetch(DATA_URL)
    .then(r => r.json())
    .then(data => { stories = data; buildMenu(); })
    .catch(() => { document.getElementById('welcome').innerHTML = '<p style="color:#f87171">Kon verhalen niet laden.</p>'; });

  function buildMenu() {
    const ul = document.getElementById('story-list');
    stories.forEach(s => {
      const li = document.createElement('li');
      li.innerHTML = `<a href="#" data-id="${s.id}">
        <span class="story-num">${s.id}</span>
        <span>${s.title}</span>
      </a>`;
      li.querySelector('a').addEventListener('click', e => { e.preventDefault(); showStory(s.id); });
      ul.appendChild(li);
    });
  }

  function showStory(id) {
    const s = stories.find(x => x.id === id);
    if (!s) return;
    stopTTS();
    current = s;

    // Update sidebar active
    document.querySelectorAll('.story-list a').forEach(a => a.classList.remove('active'));
    document.querySelector(`.story-list a[data-id="${id}"]`)?.classList.add('active');

    // Background
    setBackground(s.image_query);

    // Badge + title + subtitle
    document.getElementById('sv-badge').textContent = `Verhaal ${s.id}`;
    document.getElementById('sv-title').textContent = s.title;
    document.getElementById('sv-subtitle').textContent = s.subtitle;

    // Paragraphs
    const pc = document.getElementById('sv-paragraphs');
    pc.innerHTML = s.paragraphs.map(p => `<p>${p}</p>`).join('');

    // Vocabulary
    const vc = document.getElementById('sv-vocab');
    vc.innerHTML = s.vocabulary.map(v =>
      `<div class="vocab-card"><span class="vocab-nl">${v.nl}</span><span class="vocab-sep">—</span><span class="vocab-en">${v.en}</span></div>`
    ).join('');

    // Questions
    const qc = document.getElementById('sv-questions');
    qc.innerHTML = s.questions.map(q => `<li>${q}</li>`).join('');
    closeQuestions();

    // Show story view
    document.getElementById('welcome').style.display = 'none';
    const sv = document.getElementById('story-view');
    sv.style.display = 'block';
    sv.style.animation = 'none';
    sv.offsetHeight; // reflow
    sv.style.animation = '';

    // Scroll to top
    document.getElementById('main').scrollTo({ top: 0, behavior: 'smooth' });

    // Update TTS
    document.getElementById('tts-status').textContent = s.title;
    ['btn-restart-tts','btn-play-tts','btn-stop-tts'].forEach(id =>
      document.getElementById(id).disabled = false
    );
  }

  // ── Background ──
  function setBackground(query) {
    const url = `https://source.unsplash.com/1920x1080/?${encodeURIComponent(query)}`;
    const img = new Image();
    img.onload = () => { document.getElementById('bg').style.backgroundImage = `url('${url}')`; };
    img.src = url;
  }

  // ── Questions toggle ──
  function toggleQuestions() {
    const btn = document.getElementById('q-toggle');
    const body = document.getElementById('q-body');
    btn.classList.toggle('open');
    body.classList.toggle('open');
  }
  function closeQuestions() {
    document.getElementById('q-toggle').classList.remove('open');
    document.getElementById('q-body').classList.remove('open');
  }

  // ── TTS ──
  function getFullText() {
    if (!current) return '';
    return current.paragraphs.join(' ');
  }

  function playTTS() {
    if (!current) return;
    if (window.speechSynthesis.paused) {
      window.speechSynthesis.resume();
      isPlaying = true;
      updatePlayBtn();
      return;
    }
    stopTTS();
    utterance = new SpeechSynthesisUtterance(getFullText());
    utterance.lang = 'nl-NL';
    utterance.rate = SPEEDS[speedIdx];
    utterance.onend = () => { isPlaying = false; updatePlayBtn(); document.getElementById('tts-status').textContent = current ? current.title : ''; };
    utterance.onerror = () => { isPlaying = false; updatePlayBtn(); };
    window.speechSynthesis.speak(utterance);
    isPlaying = true;
    updatePlayBtn();
    document.getElementById('tts-status').textContent = '▶ Aan het lezen…';
  }

  function pauseTTS() {
    window.speechSynthesis.pause();
    isPlaying = false;
    updatePlayBtn();
    document.getElementById('tts-status').textContent = '⏸ Gepauzeerd';
  }

  function stopTTS() {
    window.speechSynthesis.cancel();
    isPlaying = false;
    utterance = null;
    updatePlayBtn();
    if (current) document.getElementById('tts-status').textContent = current.title;
  }

  function updatePlayBtn() {
    const btn = document.getElementById('btn-play-tts');
    if (isPlaying) {
      btn.textContent = '⏸';
      btn.classList.add('playing');
    } else {
      btn.textContent = '▶';
      btn.classList.remove('playing');
    }
  }

  document.getElementById('btn-play-tts').addEventListener('click', () => {
    if (isPlaying) pauseTTS(); else playTTS();
  });
  document.getElementById('btn-stop-tts').addEventListener('click', stopTTS);
  document.getElementById('btn-restart-tts').addEventListener('click', () => { stopTTS(); playTTS(); });
  document.getElementById('btn-speed-tts').addEventListener('click', () => {
    speedIdx = (speedIdx + 1) % SPEEDS.length;
    const spd = SPEEDS[speedIdx];
    document.getElementById('btn-speed-tts').textContent = `${spd}×`;
    if (utterance) utterance.rate = spd;
    // restart if playing so rate takes effect
    if (isPlaying) { stopTTS(); playTTS(); }
  });

  // Stop TTS on page leave
  window.addEventListener('beforeunload', () => window.speechSynthesis.cancel());
</script>
</body>
</html>
