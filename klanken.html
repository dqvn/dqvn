<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎵 Klanken Leren – Dutch Sounds</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/klanken.css">
  <link rel="stylesheet" href="assets/css/sync.css">
</head>
<body>

<!-- ══ MOBILE BAR ══ -->
<div id="mob-bar">
  <button id="mob-menu-btn" aria-label="Open menu">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none"
         stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <path d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
  </button>
  <span id="mob-cur">🎵 Klanken Leren</span>
</div>
<div id="drawer-overlay"></div>

<!-- ══ SIDEBAR ══ -->
<nav id="sidebar">
  <div class="sb-drag-handle"></div>

  <div class="sb-logo">
    <h1>🎵 Klanken Leren</h1>
    <p>Leer Nederlandse klanken uitspreken!</p>
  </div>

  <!-- Cloud sync (populated by sync.js) -->
  <div id="sync-section"></div>

  <div id="sb-scroll">

    <!-- Voice selector -->
    <div class="voice-section">
      <div class="voice-label">🔊 Stem </div>
      <div class="voice-row">
        <select id="voice-select" class="voice-select" onchange="selectVoice(this.value)">
          <option disabled selected>Laden…</option>
        </select>
      </div>
    </div>

    <!-- Volume control -->
    <div class="vol-section">
      <div class="voice-label">🔉 Volume </div>
      <div class="vol-row">
        <input type="range" id="vol-slider" class="vol-slider"
               min="0" max="100" value="100"
               oninput="setVolume(this.value)">
        <span id="vol-val" class="vol-val">100%</span>
      </div>
    </div>

    <div id="no-voice" class="no-voice-banner">
      ⚠️ Geen Nederlandse stem gevonden — probeer Chrome op Windows of Android.
    </div>

    <!-- Sound navigation (rendered by klanken.js) -->
    <div id="sound-nav"></div>

  </div><!-- #sb-scroll -->

  <!-- Fixed bottom of sidebar -->
  <div id="sb-back-link">
    <a href="/dqvn/">← Main Menu</a>
  </div>
  <footer id="app-footer">
    <div class="ft-avatar">QN</div>
    <div class="ft-info">
      <span class="ft-name">Quang, Nguyen Dang</span>
      <a class="ft-email" href="mailto:dqvn2002@gmail.com">dqvn2002@gmail.com</a>
    </div>
  </footer>
</nav>

<!-- ══ CONTENT ══ -->
<div id="content">
  <div id="welcome">
    <div class="welcome-logo">🎵</div>
    <h2>Welkom!</h2>
    <p>Kies een klank uit het menu om te beginnen.</p>
  </div>
  <div id="detail"></div>
</div>

<div id="toast" class="toast"></div>

<script src="assets/js/klanken.js" defer></script>
<script src="assets/js/sync.js" defer></script>
</body>
</html>
