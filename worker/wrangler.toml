name              = "nl-sync"
main              = "index.js"
compatibility_date = "2024-11-01"

# ── Public vars (safe to commit) ─────────────────────────────────────────
[vars]
GOOGLE_CLIENT_ID = "813394172048-mn81bvhivheomlm3453on49f5gbp31so.apps.googleusercontent.com"

# ── Secrets — NEVER commit these values ──────────────────────────────────
# Run once from this folder to set them:
#
#   wrangler secret put UPSTASH_URL
#   wrangler secret put UPSTASH_TOKEN
#
# Then deploy:
#   wrangler deploy
#
# Your worker URL will be: https://nl-sync.<your-subdomain>.workers.dev
# Paste that URL into assets/sync.js → SYNC_WORKER_URL
