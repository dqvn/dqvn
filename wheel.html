<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎡 Draairad – Nederlands</title>
  <link rel="icon" href="assets/img/dutch.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/sync.css">
  <link rel="stylesheet" href="assets/css/wheel.css">
</head>
<body>

  <nav id="top-nav">
    <a href="index.html" class="nav-back">← Terug</a>
    <span class="nav-title">🎡 Draairad</span>
    <button id="sync-nav-btn" onclick="toggleSyncDrawer()" title="Sync &amp; Account">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </button>
  </nav>

  <div id="app">

    <div id="main-layout">

      <!-- ── Wheel column ─────────────────────────────── -->
      <div id="wheel-col">
        <div id="wheel-wrap">
          <div id="wheel-pointer"></div>
          <canvas id="wheel-canvas" onclick="spin()" title="Klik om te draaien!"></canvas>
        </div>
      </div>

      <!-- ── List column ──────────────────────────────── -->
      <div id="list-col">

        <div>
          <div class="section-label">Actief pakket</div>
          <div id="pkg-selector">
            <select id="pkg-select" onchange="selectPackage(this.value)"></select>
            <button class="btn-manage" onclick="openPkgModal()">⚙️ Beheer</button>
          </div>
          <button id="spin-btn" onclick="spin()">🎲 Draaien!</button>
        </div>

        <div>
          <div class="section-label">Items (<span id="item-count">0</span>)</div>
          <div id="items-box">
            <div id="items-list"></div>
            <div class="add-item-row">
              <input id="add-item-input" placeholder="Nieuw item toevoegen…"
                     onkeydown="if(event.key==='Enter') addInlineItem()">
              <button onclick="addInlineItem()" title="Toevoegen">+</button>
            </div>
          </div>
        </div>

        <div id="history-section">
          <div class="section-label">Recente picks</div>
          <div id="history-list"></div>
        </div>

      </div><!-- #list-col -->

    </div><!-- #main-layout -->

  </div><!-- #app -->

  <!-- ── Result Modal ──────────────────────────────────── -->
  <div id="result-modal" class="hidden">
    <div class="rcard">
      <div class="rcard-bar" id="rcard-bar"></div>
      <div class="rcard-inner">
        <div class="rcard-glow" id="rcard-glow"></div>
        <div class="rcard-label">✨ &nbsp; Gekozen! &nbsp; ✨</div>
        <div class="rcard-text-row">
          <button class="rcard-speak-icon" onclick="speakResult()" title="Hoor uitspraak">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
          </button>
          <div id="rcard-text"></div>
        </div>
        <div class="rcard-btns">
          <button class="rbtn rbtn-remove" onclick="removeWinner()">
            <div class="rbtn-icon">✕</div>
            <div class="rbtn-lbl">Verwijder</div>
            <div class="rbtn-desc">Haal dit item uit de lijst</div>
          </button>
          <button class="rbtn rbtn-spin"   onclick="closeResultAndSpin()">
            <div class="rbtn-icon">🎲</div>
            <div class="rbtn-lbl">Opnieuw</div>
            <div class="rbtn-desc">Draai het wiel nog een keer</div>
          </button>
          <button class="rbtn rbtn-close"  onclick="hideResult()">
            <div class="rbtn-icon">✓</div>
            <div class="rbtn-lbl">Klaar</div>
            <div class="rbtn-desc">Bewaar item &amp; sluit</div>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Package Manager Modal ──────────────────────────── -->
  <div id="pkg-modal" class="modal-overlay hidden">
    <div class="modal-panel">
      <div class="modal-topbar">
        <h3>📦 Pakketten beheren</h3>
        <button class="btn-close" onclick="closePkgModal()">×</button>
      </div>
      <div class="modal-body">
        <div id="modal-pkg-list"></div>
        <button class="btn-new-pkg" onclick="newPackage()">+ Nieuw pakket aanmaken</button>
        <div id="pkg-editor" class="hidden">
          <input id="editor-name" placeholder="Naam van het pakket…" maxlength="48">
          <div class="editor-hint">Vul items in — één per regel (max. 50 items):</div>
          <textarea id="editor-items" placeholder="Hoe gaat het?&#10;Hoe heet je?&#10;Waar kom je vandaan?&#10;Wat doe je?&#10;…"></textarea>
          <div class="editor-actions">
            <button onclick="cancelEdit()">Annuleren</button>
            <button class="primary" onclick="saveEdit()">✓ Opslaan</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Sync drawer ───────────────────────────────────────── -->
  <div id="sync-backdrop" onclick="closeSyncDrawer()"></div>
  <div id="sync-drawer">
    <div class="sdrawer-hd">
      <span class="sdrawer-title">☁️ Sync &amp; Account</span>
      <button class="sdrawer-close" onclick="closeSyncDrawer()">×</button>
    </div>
    <div class="sdrawer-body sidebar-dark">
      <div id="sync-section"></div>
    </div>
  </div>

  <div id="_toast"></div>

  <script src="assets/js/sync.js"></script>
  <script src="assets/js/wheel.js" defer></script>
</body>
</html>
