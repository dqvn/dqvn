<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎡 Draairad – Nederlands</title>
  <link rel="icon" href="assets/img/dutch.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/sync.css">
  <style>
    :root {
      --bg:#0f172a; --bg2:#1e293b; --bg3:#273549;
      --orange:#e85d04; --ord:#c44f00;
      --accent:#ffd166; --teal:#06d6a0; --red:#ef476f; --purple:#9b5de5;
      --text:#f1f5f9; --muted:rgba(241,245,249,.52);
      --card:rgba(255,255,255,.05); --border:rgba(255,255,255,.1);
      --r:16px; --nav-h:56px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Nav ─────────────────────────────────────────────── */
    #top-nav {
      position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h);
      background: rgba(15,23,42,.96); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; padding: 0 16px;
      z-index: 200;
    }
    .nav-back { color: var(--accent); text-decoration: none; font-weight: 800; font-size: .9rem; transition: opacity .2s; }
    .nav-back:hover { opacity: .7; }
    .nav-title { flex: 1; text-align: center; font-size: 1.1rem; font-weight: 900; }

    /* ── App ─────────────────────────────────────────────── */
    #app {
      padding-top: var(--nav-h);
      padding-left: 16px; padding-right: 16px; padding-bottom: 56px;
    }

    #sync-wrapper { border-bottom: 1px solid var(--border); }

    /* ── Main layout ─────────────────────────────────────── */
    #main-layout {
      display: flex; gap: 28px; padding-top: 20px; align-items: flex-start;
    }

    #wheel-col {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; align-items: center; gap: 18px;
    }

    #list-col {
      width: 320px; flex-shrink: 0;
      display: flex; flex-direction: column; gap: 16px;
    }

    /* ── Wheel wrap & pointer ───────────────────────────── */
    #wheel-wrap {
      position: relative;
      display: inline-block;
    }

    #wheel-pointer {
      position: absolute;
      top: -2px; left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 30px solid var(--accent);
      filter: drop-shadow(0 3px 6px rgba(0,0,0,.7));
      z-index: 10;
      pointer-events: none;
    }

    #wheel-canvas {
      display: block;
      border-radius: 50%;
      box-shadow:
        0 10px 56px rgba(0,0,0,.6),
        0 0 0 4px rgba(255,255,255,.07),
        0 0 0 8px rgba(255,255,255,.03);
      cursor: pointer;
      transition: box-shadow .3s;
    }
    #wheel-canvas:hover:not(.spinning) {
      box-shadow:
        0 12px 64px rgba(232,93,4,.45),
        0 0 0 4px rgba(232,93,4,.2),
        0 0 0 8px rgba(232,93,4,.08);
    }

    /* ── Spin button ─────────────────────────────────────── */
    #spin-btn {
      background: linear-gradient(135deg, var(--orange), var(--ord));
      color: white; border: none; border-radius: 28px;
      padding: 16px 44px; font-size: 1.2rem; font-weight: 900;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 6px 28px rgba(232,93,4,.5);
      transition: transform .2s, box-shadow .2s, opacity .2s;
      min-width: 210px; letter-spacing: .5px;
    }
    #spin-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 36px rgba(232,93,4,.6); }
    #spin-btn:active:not(:disabled) { transform: scale(.97); }
    #spin-btn:disabled { opacity: .38; cursor: not-allowed; }

    /* ── Result Modal ────────────────────────────────────── */
    #result-modal {
      position: fixed; inset: 0;
      background: rgba(3,7,18,.9);
      backdrop-filter: blur(16px);
      z-index: 800;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      animation: rmIn .28s ease;
    }
    #result-modal.hidden { display: none; }
    @keyframes rmIn { from { opacity: 0; } to { opacity: 1; } }

    .rcard {
      background: var(--bg2);
      border-radius: 32px;
      width: 100%; max-width: 620px;
      position: relative; overflow: hidden;
      animation: rcPop .48s cubic-bezier(.34,1.56,.64,1);
      box-shadow: 0 32px 96px rgba(0,0,0,.8), 0 0 0 1px rgba(255,255,255,.07);
    }
    @keyframes rcPop {
      from { transform: scale(.72) translateY(28px); opacity: 0; }
      to   { transform: scale(1)   translateY(0);    opacity: 1; }
    }

    /* Segment-color accent bar at top */
    .rcard-bar { height: 6px; width: 100%; }

    .rcard-inner {
      padding: 36px 48px 44px;
      text-align: center;
      position: relative;
    }

    /* Ambient glow blob behind the text */
    .rcard-glow {
      position: absolute;
      top: -80px; left: 50%; transform: translateX(-50%);
      width: 480px; height: 380px;
      border-radius: 50%;
      opacity: .13; filter: blur(72px);
      pointer-events: none; z-index: 0;
    }

    .rcard-label {
      position: relative; z-index: 1;
      font-size: .68rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 3px; color: var(--muted);
      margin-bottom: 22px;
    }

    #rcard-text {
      position: relative; z-index: 1;
      font-size: clamp(1.8rem, 5vw, 3.4rem);
      font-weight: 900; line-height: 1.2;
      margin-bottom: 38px;
      word-break: break-word; letter-spacing: -.01em;
    }

    /* 2 × 2 action grid */
    .rcard-btns {
      position: relative; z-index: 1;
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }

    .rbtn {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 6px; padding: 18px 10px;
      border-radius: 18px; border: 1.5px solid var(--border);
      background: var(--card); color: var(--text);
      cursor: pointer; font-family: inherit; font-weight: 800;
      transition: transform .2s, box-shadow .2s;
    }
    .rbtn:hover  { transform: translateY(-4px); }
    .rbtn:active { transform: scale(.96); }
    .rbtn-icon { font-size: 1.7rem; line-height: 1; }
    .rbtn-lbl  { font-size: .76rem; }

    .rbtn-speak  { color:#60a5fa; border-color:rgba(96,165,250,.3);  background:rgba(96,165,250,.07);  }
    .rbtn-remove { color:var(--red); border-color:rgba(239,71,111,.3); background:rgba(239,71,111,.07); }
    .rbtn-spin   { color:var(--orange); border-color:rgba(232,93,4,.35); background:rgba(232,93,4,.09); }
    .rbtn-close  {
      background: linear-gradient(135deg, var(--teal), #059669);
      border-color: transparent; color: #fff;
      box-shadow: 0 4px 22px rgba(6,214,160,.3);
    }
    .rbtn-close:hover { box-shadow: 0 8px 32px rgba(6,214,160,.5); }

    @media (max-width: 440px) {
      .rcard-inner { padding: 28px 20px 32px; }
      .rbtn        { padding: 14px 8px; }
      #rcard-text  { margin-bottom: 28px; }
    }

    /* ── Section label ───────────────────────────────────── */
    .section-label {
      font-size: .72rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted); margin-bottom: 7px;
    }

    /* ── Package selector ────────────────────────────────── */
    #pkg-selector { display: flex; gap: 8px; align-items: center; }
    #pkg-select {
      flex: 1; background: var(--card); border: 1.5px solid var(--border);
      border-radius: 12px; color: var(--text);
      padding: 10px 14px; font-family: inherit; font-size: .9rem;
      cursor: pointer; outline: none;
      appearance: none; -webkit-appearance: none;
    }
    #pkg-select:focus { border-color: var(--orange); }
    #pkg-select option { background: #1e293b; color: var(--text); }
    .btn-manage {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 12px; color: var(--muted);
      padding: 10px 14px; font-size: .88rem; font-weight: 800;
      cursor: pointer; transition: all .18s; white-space: nowrap;
    }
    .btn-manage:hover { border-color: var(--orange); color: var(--orange); }

    /* ── Items box ───────────────────────────────────────── */
    #items-box {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--r); overflow: hidden;
    }

    #items-list { max-height: 240px; overflow-y: auto; padding: 6px; }
    #items-list::-webkit-scrollbar { width: 4px; }
    #items-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .item-chip {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 10px; border-radius: 10px; transition: background .15s;
    }
    .item-chip:hover { background: rgba(255,255,255,.06); }
    .chip-dot  { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .chip-text { flex: 1; font-size: .88rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chip-del  {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 1rem; padding: 0 3px; opacity: 0; transition: opacity .15s, color .15s; flex-shrink: 0;
    }
    .item-chip:hover .chip-del { opacity: 1; }
    .chip-del:hover { color: var(--red); }

    .add-item-row {
      display: flex; gap: 6px; padding: 8px 10px;
      border-top: 1px solid var(--border);
    }
    .add-item-row input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: inherit; font-size: .88rem;
    }
    .add-item-row input::placeholder { color: var(--muted); }
    .add-item-row button {
      background: var(--orange); border: none; border-radius: 9px;
      color: white; width: 32px; height: 32px; cursor: pointer;
      font-size: 1.25rem; font-weight: 900; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .18s;
    }
    .add-item-row button:hover { background: var(--ord); }

    /* ── History ─────────────────────────────────────────── */
    #history-section {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--r); padding: 12px 14px;
    }
    #history-list { display: flex; flex-direction: column; gap: 3px; margin-top: 8px; }
    .hist-item {
      display: flex; align-items: center; gap: 9px;
      padding: 5px 2px; border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .hist-item:last-child { border-bottom: none; }
    .hist-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .hist-text { flex: 1; font-size: .84rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hist-time { font-size: .72rem; color: var(--muted); opacity: .55; flex-shrink: 0; }

    /* ── Empty state ─────────────────────────────────────── */
    .empty-msg { font-size: .85rem; color: var(--muted); padding: 14px 10px; text-align: center; }

    /* ── Mobile ──────────────────────────────────────────── */
    @media (max-width: 680px) {
      #main-layout { flex-direction: column; align-items: center; }
      #list-col { width: 100%; flex-shrink: unset; }
      #items-list { max-height: 180px; }
    }

    /* ── Package Manager Modal ───────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.76);
      backdrop-filter: blur(6px); z-index: 600;
      display: flex; align-items: center; justify-content: center;
      padding: 16px; animation: mFadeIn .2s ease;
    }
    .modal-overlay.hidden { display: none; }
    @keyframes mFadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal-panel {
      background: var(--bg2); border: 1.5px solid var(--border);
      border-radius: 24px; width: 100%; max-width: 560px;
      max-height: 88vh; overflow-y: auto; display: flex; flex-direction: column;
    }

    .modal-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg2); z-index: 1;
    }
    .modal-topbar h3 { font-size: 1.1rem; font-weight: 900; }
    .btn-close {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 50%; color: var(--text); width: 34px; height: 34px;
      font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .18s;
    }
    .btn-close:hover { background: rgba(239,71,111,.2); border-color: var(--red); color: var(--red); }

    .modal-body { padding: 16px 24px 24px; display: flex; flex-direction: column; gap: 10px; }

    .modal-pkg-row {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 12px 14px;
      display: flex; align-items: center; gap: 12px; transition: border-color .18s;
    }
    .modal-pkg-row.is-active { border-color: var(--orange); background: rgba(232,93,4,.08); }
    .mpkg-icon { font-size: 1.4rem; flex-shrink: 0; }
    .mpkg-info { flex: 1; min-width: 0; }
    .mpkg-name  { font-weight: 800; font-size: .92rem; }
    .mpkg-count { font-size: .76rem; color: var(--muted); margin-top: 1px; }
    .mpkg-acts  { display: flex; gap: 6px; flex-shrink: 0; }
    .mpkg-btn {
      background: none; border: 1.5px solid var(--border);
      border-radius: 9px; color: var(--muted); padding: 5px 10px;
      font-size: .76rem; font-weight: 800; cursor: pointer;
      font-family: inherit; transition: all .15s;
    }
    .mpkg-btn:hover         { border-color: var(--orange); color: var(--orange); }
    .mpkg-btn.danger:hover  { border-color: var(--red);    color: var(--red);    }

    .btn-new-pkg {
      background: rgba(232,93,4,.1); border: 1.5px dashed rgba(232,93,4,.4);
      border-radius: 14px; color: var(--orange);
      padding: 13px; font-size: .92rem; font-weight: 800;
      cursor: pointer; font-family: inherit; width: 100%;
      transition: background .18s, border-color .18s;
    }
    .btn-new-pkg:hover { background: rgba(232,93,4,.2); border-color: var(--orange); }

    /* Editor */
    #pkg-editor {
      background: var(--bg3); border: 1.5px solid var(--border);
      border-radius: 16px; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    #pkg-editor.hidden { display: none; }
    #editor-name {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--text); padding: 10px 14px;
      font-family: inherit; font-size: .95rem; font-weight: 700;
      outline: none; width: 100%;
    }
    #editor-name:focus { border-color: var(--orange); }
    .editor-hint { font-size: .78rem; color: var(--muted); }
    #editor-items {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--text); padding: 10px 14px;
      font-family: inherit; font-size: .86rem; outline: none;
      width: 100%; resize: vertical; min-height: 180px; line-height: 1.7;
    }
    #editor-items:focus { border-color: var(--orange); }
    .editor-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .editor-actions button {
      border: 1.5px solid var(--border); border-radius: 10px; background: var(--card);
      color: var(--text); padding: 9px 20px; font-size: .88rem; font-weight: 800;
      cursor: pointer; font-family: inherit; transition: all .18s;
    }
    .editor-actions button.primary {
      background: linear-gradient(135deg, var(--orange), var(--ord));
      border-color: transparent; color: white;
    }
    .editor-actions button:hover { transform: translateY(-1px); }

    /* ── Confetti ────────────────────────────────────────── */
    @keyframes cfall { to { transform: translateY(105vh) rotate(900deg); opacity: 0; } }

    /* ── Toast ───────────────────────────────────────────── */
    #_toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg2); color: var(--text);
      padding: 11px 22px; border-radius: 24px;
      font-weight: 700; font-size: .88rem;
      border: 1.5px solid var(--border); opacity: 0;
      transition: all .32s; z-index: 9000; white-space: nowrap;
    }
    #_toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>

  <nav id="top-nav">
    <a href="index.html" class="nav-back">← Terug</a>
    <span class="nav-title">🎡 Draairad</span>
  </nav>

  <div id="app">

    <div class="sidebar-dark" id="sync-wrapper">
      <div id="sync-section"></div>
    </div>

    <div id="main-layout">

      <!-- ── Wheel column ─────────────────────────────── -->
      <div id="wheel-col">

        <div id="wheel-wrap">
          <div id="wheel-pointer"></div>
          <canvas id="wheel-canvas" onclick="spin()" title="Klik om te draaien!"></canvas>
        </div>

        <button id="spin-btn" onclick="spin()">🎲 Draaien!</button>

      </div>

      <!-- ── List column ──────────────────────────────── -->
      <div id="list-col">

        <div>
          <div class="section-label">Actief pakket</div>
          <div id="pkg-selector">
            <select id="pkg-select" onchange="selectPackage(this.value)"></select>
            <button class="btn-manage" onclick="openPkgModal()">⚙️ Beheer</button>
          </div>
        </div>

        <div>
          <div class="section-label">Items (<span id="item-count">0</span>)</div>
          <div id="items-box">
            <div id="items-list"></div>
            <div class="add-item-row">
              <input id="add-item-input" placeholder="Nieuw item toevoegen…"
                     onkeydown="if(event.key==='Enter') addInlineItem()">
              <button onclick="addInlineItem()" title="Toevoegen">+</button>
            </div>
          </div>
        </div>

        <div id="history-section">
          <div class="section-label">Recente picks</div>
          <div id="history-list"></div>
        </div>

      </div><!-- #list-col -->

    </div><!-- #main-layout -->

  </div><!-- #app -->

  <!-- ── Result Modal ──────────────────────────────────── -->
  <div id="result-modal" class="hidden">
    <div class="rcard">
      <div class="rcard-bar" id="rcard-bar"></div>
      <div class="rcard-inner">
        <div class="rcard-glow" id="rcard-glow"></div>
        <div class="rcard-label">✨ &nbsp; Gekozen! &nbsp; ✨</div>
        <div id="rcard-text"></div>
        <div class="rcard-btns">
          <button class="rbtn rbtn-speak"  onclick="speakResult()">
            <div class="rbtn-icon">🔊</div><div class="rbtn-lbl">Herhaal</div>
          </button>
          <button class="rbtn rbtn-remove" onclick="removeWinner()">
            <div class="rbtn-icon">✕</div><div class="rbtn-lbl">Verwijder</div>
          </button>
          <button class="rbtn rbtn-spin"   onclick="closeResultAndSpin()">
            <div class="rbtn-icon">🎲</div><div class="rbtn-lbl">Opnieuw</div>
          </button>
          <button class="rbtn rbtn-close"  onclick="hideResult()">
            <div class="rbtn-icon">✓</div><div class="rbtn-lbl">Klaar</div>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Package Manager Modal ──────────────────────────── -->
  <div id="pkg-modal" class="modal-overlay hidden">
    <div class="modal-panel">
      <div class="modal-topbar">
        <h3>📦 Pakketten beheren</h3>
        <button class="btn-close" onclick="closePkgModal()">×</button>
      </div>
      <div class="modal-body">
        <div id="modal-pkg-list"></div>
        <button class="btn-new-pkg" onclick="newPackage()">+ Nieuw pakket aanmaken</button>
        <div id="pkg-editor" class="hidden">
          <input id="editor-name" placeholder="Naam van het pakket…" maxlength="48">
          <div class="editor-hint">Vul items in — één per regel (max. 50 items):</div>
          <textarea id="editor-items" placeholder="Hoe gaat het?&#10;Hoe heet je?&#10;Waar kom je vandaan?&#10;Wat doe je?&#10;…"></textarea>
          <div class="editor-actions">
            <button onclick="cancelEdit()">Annuleren</button>
            <button class="primary" onclick="saveEdit()">✓ Opslaan</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="_toast"></div>

  <script src="assets/js/sync.js"></script>
  <script>
  'use strict';

  /* ── Constants ─────────────────────────────────────────── */
  const PKGS_KEY   = 'nl_wheel_pkgs';
  const ACTIVE_KEY = 'nl_wheel_active';
  const HIST_KEY   = 'nl_wheel_hist';
  const MAX_HIST   = 8;
  const MAX_ITEMS  = 50;

  const COLORS = [
    '#e85d04','#ffd166','#06d6a0','#118ab2',
    '#ef476f','#9b5de5','#f77f00','#2ec4b6',
  ];

  const DEFAULT_PKG = {
    id: 'default',
    name: 'Dagelijkse vragen 🇳🇱',
    items: [
      'Hoe gaat het?',
      'Hoe heet je?',
      'Waar kom je vandaan?',
      'Waar woon je?',
      'Wat doe je?',
      'Hoe oud ben je?',
      'Spreek je Nederlands?',
      'Wat is je hobby?',
      'Heb je een huisdier?',
      'Wat eet je graag?',
      'Wanneer slaap je?',
      'Wat vind je leuk?',
      'Ben je getrouwd?',
      'Heb je kinderen?',
      'Wat is je favoriete kleur?',
    ],
  };

  /* ── State ─────────────────────────────────────────────── */
  let packages    = [];
  let activePkgId = null;
  let spinHistory = [];
  let spinning    = false;
  let rotation    = 0;       // current wheel angle (radians)
  let winnerIdx   = -1;      // index of last selected item
  let editingId   = null;    // null = creating new package
  let _lastSeg    = -1;      // for tick sound
  let _audioCtx   = null;    // lazy Web Audio context
  let _spinAF     = null;    // rAF handle

  /* ── Canvas ─────────────────────────────────────────────── */
  const canvas = document.getElementById('wheel-canvas');

  function resizeCanvas() {
    const desktop = window.innerWidth > 680;
    let size;

    if (desktop) {
      // Width: full viewport minus list col (320), gap (28), horizontal padding (32)
      const availW = window.innerWidth - 320 - 28 - 32 - 24;
      // Height: viewport minus nav (56), sync bar (~50), layout padding (20),
      //         spin-btn + result + gaps below wheel (~180)
      const availH = window.innerHeight - 56 - 50 - 20 - 180;
      size = Math.max(Math.min(availW, availH), 300);
    } else {
      size = Math.min(window.innerWidth - 32, 380);
    }

    canvas.width  = size;
    canvas.height = size;

    // Scale pointer triangle proportionally to canvas
    const half = Math.round(size * 0.034);
    const tall = Math.round(size * 0.068);
    const ptr  = document.getElementById('wheel-pointer');
    ptr.style.borderLeftWidth  = half + 'px';
    ptr.style.borderRightWidth = half + 'px';
    ptr.style.borderTopWidth   = tall + 'px';

    drawWheel();
  }

  function drawWheel() {
    const ctx   = canvas.getContext('2d');
    const items = getActiveItems();
    const n     = items.length;
    const cx    = canvas.width  / 2;
    const cy    = canvas.height / 2;
    const r     = Math.min(cx, cy) - 6;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (n === 0) {
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, 2 * Math.PI);
      ctx.fillStyle = 'rgba(255,255,255,.04)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,.14)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = 'rgba(241,245,249,.35)';
      ctx.font = `700 14px Nunito, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Voeg items toe →', cx, cy);
      return;
    }

    const segArc   = (2 * Math.PI) / n;
    const fontSize = Math.max(9, Math.min(14, 14 - n * 0.12));

    for (let i = 0; i < n; i++) {
      const startAng = rotation + i * segArc;
      const endAng   = startAng + segArc;
      const color    = COLORS[i % COLORS.length];

      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, startAng, endAng);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,.3)';
      ctx.lineWidth   = 1.5;
      ctx.stroke();

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(startAng + segArc / 2);
      ctx.textAlign    = 'right';
      ctx.textBaseline = 'middle';
      ctx.fillStyle    = '#fff';
      ctx.font         = `800 ${fontSize}px Nunito, sans-serif`;
      ctx.shadowColor  = 'rgba(0,0,0,.5)';
      ctx.shadowBlur   = 3;
      const maxLen = n <= 6 ? 26 : n <= 12 ? 20 : 15;
      const label  = items[i].length > maxLen ? items[i].slice(0, maxLen - 1) + '…' : items[i];
      ctx.fillText(label, r - 12, 0);
      ctx.restore();
    }

    // Rim ring
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, 2 * Math.PI);
    ctx.strokeStyle = 'rgba(255,255,255,.18)';
    ctx.lineWidth   = 3;
    ctx.stroke();

    // Center cap
    ctx.beginPath();
    ctx.arc(cx, cy, 24, 0, 2 * Math.PI);
    ctx.fillStyle = '#0f172a';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,.22)';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.font          = '16px sans-serif';
    ctx.textAlign     = 'center';
    ctx.textBaseline  = 'middle';
    ctx.shadowBlur    = 0;
    ctx.fillStyle     = '#fff';
    ctx.fillText('🎲', cx, cy + 1);
  }

  /* ── Spin ───────────────────────────────────────────────── */
  function spin() {
    const items = getActiveItems();
    if (spinning) return;
    if (items.length < 2) {
      showToast('Voeg minimaal 2 items toe om te draaien! 🎡');
      return;
    }

    closeResultModal();
    spinning = true;
    winnerIdx = -1;
    document.getElementById('spin-btn').disabled = true;
    canvas.classList.add('spinning');

    const startRot  = rotation;
    const totalSpin = (2 * Math.PI) * (6 + Math.random() * 6);
    const duration  = 3600 + Math.random() * 1800;
    const startTime = performance.now();
    _lastSeg        = -1;

    function frame(now) {
      const elapsed = now - startTime;
      const t       = Math.min(elapsed / duration, 1);
      const eased   = 1 - Math.pow(1 - t, 4);

      rotation = startRot + totalSpin * eased;
      drawWheel();
      _checkTick(items.length);

      if (t < 1) {
        _spinAF = requestAnimationFrame(frame);
        return;
      }

      // Done
      rotation  = rotation % (2 * Math.PI);
      spinning  = false;
      canvas.classList.remove('spinning');
      document.getElementById('spin-btn').disabled = false;

      const segArc = (2 * Math.PI) / items.length;
      const norm   = ((-Math.PI / 2 - rotation) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
      winnerIdx    = Math.floor(norm / segArc) % items.length;
      _showResult(items[winnerIdx], winnerIdx);
    }

    _spinAF = requestAnimationFrame(frame);
  }

  function _checkTick(n) {
    if (!n) return;
    const segArc = (2 * Math.PI) / n;
    const norm   = ((-Math.PI / 2 - rotation) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
    const seg    = Math.floor(norm / segArc) % n;
    if (seg !== _lastSeg) { _lastSeg = seg; playTick(); }
  }

  function _showResult(text, idx) {
    const color = COLORS[idx % COLORS.length];
    document.getElementById('rcard-text').textContent      = text;
    document.getElementById('rcard-text').style.color      = color;
    document.getElementById('rcard-bar').style.background  = color;
    document.getElementById('rcard-glow').style.background = color;

    const modal = document.getElementById('result-modal');
    modal.classList.remove('hidden');
    const card = modal.querySelector('.rcard');
    card.style.animation = 'none';
    requestAnimationFrame(() => { card.style.animation = ''; });

    addHistory(text, idx);
    speak(text);
    launchConfetti();
  }

  function closeResultModal() {
    document.getElementById('result-modal').classList.add('hidden');
  }

  function speakResult() {
    speak(document.getElementById('rcard-text').textContent);
  }

  function closeResultAndSpin() {
    closeResultModal();
    winnerIdx = -1;
    setTimeout(spin, 80);
  }

  function removeWinner() {
    const pkg = getActivePkg();
    if (!pkg || winnerIdx < 0 || winnerIdx >= pkg.items.length) return;
    pkg.items.splice(winnerIdx, 1);
    winnerIdx = -1;
    savePackages();
    renderItemsList();
    drawWheel();
    closeResultModal();
    if (pkg.items.length === 0) showToast('Pakket is leeg! Voeg nieuwe items toe.');
  }

  function hideResult() {
    closeResultModal();
    winnerIdx = -1;
  }

  /* ── History ────────────────────────────────────────────── */
  function addHistory(text, idx) {
    spinHistory.unshift({ text, color: COLORS[idx % COLORS.length], ts: Date.now() });
    if (spinHistory.length > MAX_HIST) spinHistory.pop();
    try { localStorage.setItem(HIST_KEY, JSON.stringify(spinHistory)); } catch {}
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('history-list');
    if (!spinHistory.length) {
      list.innerHTML = '<div class="empty-msg">Nog geen draaien…</div>';
      return;
    }
    list.innerHTML = spinHistory.map(h => `
      <div class="hist-item">
        <div class="hist-dot" style="background:${h.color}"></div>
        <div class="hist-text">${_esc(h.text)}</div>
        <div class="hist-time">${_relTime(h.ts)}</div>
      </div>`).join('');
  }

  /* ── Package helpers ────────────────────────────────────── */
  function getActivePkg()    { return packages.find(p => p.id === activePkgId) ?? packages[0] ?? null; }
  function getActiveItems()  { return getActivePkg()?.items ?? []; }

  function selectPackage(id) {
    activePkgId = id;
    try { localStorage.setItem(ACTIVE_KEY, id); } catch {}
    closeResultModal();
    winnerIdx = -1;
    renderItemsList();
    drawWheel();
  }

  function renderPkgSelect() {
    const sel = document.getElementById('pkg-select');
    sel.innerHTML = packages.map(p =>
      `<option value="${_esc(p.id)}" ${p.id === activePkgId ? 'selected' : ''}>${_esc(p.name)}</option>`
    ).join('');
  }

  function renderItemsList() {
    const items = getActiveItems();
    document.getElementById('item-count').textContent = items.length;
    const list = document.getElementById('items-list');
    if (!items.length) {
      list.innerHTML = '<div class="empty-msg">Geen items — voeg er een toe hieronder!</div>';
      return;
    }
    list.innerHTML = items.map((item, i) => `
      <div class="item-chip">
        <div class="chip-dot" style="background:${COLORS[i % COLORS.length]}"></div>
        <div class="chip-text" title="${_esc(item)}">${_esc(item)}</div>
        <button class="chip-del" onclick="deleteInlineItem(${i})" title="Verwijderen">×</button>
      </div>`).join('');
  }

  function addInlineItem() {
    const input = document.getElementById('add-item-input');
    const text  = input.value.trim();
    if (!text) return;
    const pkg = getActivePkg();
    if (!pkg) { showToast('Selecteer eerst een pakket'); return; }
    if (pkg.items.length >= MAX_ITEMS) { showToast(`Max. ${MAX_ITEMS} items per pakket`); return; }
    pkg.items.push(text);
    input.value = '';
    savePackages();
    renderItemsList();
    drawWheel();
    input.focus();
  }

  function deleteInlineItem(idx) {
    const pkg = getActivePkg();
    if (!pkg) return;
    pkg.items.splice(idx, 1);
    if (winnerIdx === idx) { winnerIdx = -1; closeResultModal(); }
    savePackages();
    renderItemsList();
    drawWheel();
  }

  /* ── Package CRUD ───────────────────────────────────────── */
  function openPkgModal() {
    document.getElementById('pkg-editor').classList.add('hidden');
    renderModalPkgList();
    document.getElementById('pkg-modal').classList.remove('hidden');
  }

  function closePkgModal() {
    document.getElementById('pkg-modal').classList.add('hidden');
    document.getElementById('pkg-editor').classList.add('hidden');
    editingId = null;
    renderPkgSelect();
    renderItemsList();
    drawWheel();
  }

  function renderModalPkgList() {
    document.getElementById('modal-pkg-list').innerHTML = packages.map(p => `
      <div class="modal-pkg-row ${p.id === activePkgId ? 'is-active' : ''}">
        <div class="mpkg-icon">${p.id === 'default' ? '🇳🇱' : '📋'}</div>
        <div class="mpkg-info">
          <div class="mpkg-name">${_esc(p.name)}</div>
          <div class="mpkg-count">${p.items.length} item${p.items.length !== 1 ? 's' : ''}</div>
        </div>
        <div class="mpkg-acts">
          <button class="mpkg-btn" onclick="editPackage('${_esc(p.id)}')">✏️ Bewerk</button>
          ${p.id !== 'default'
            ? `<button class="mpkg-btn danger" onclick="deletePackage('${_esc(p.id)}')">✕</button>`
            : ''}
        </div>
      </div>`).join('');
  }

  function editPackage(id) {
    editingId = id;
    const pkg = packages.find(p => p.id === id);
    if (!pkg) return;
    document.getElementById('editor-name').value  = pkg.name;
    document.getElementById('editor-items').value = pkg.items.join('\n');
    document.getElementById('pkg-editor').classList.remove('hidden');
    document.getElementById('editor-name').focus();
    document.getElementById('pkg-editor').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function newPackage() {
    editingId = null;
    document.getElementById('editor-name').value  = '';
    document.getElementById('editor-items').value = '';
    document.getElementById('pkg-editor').classList.remove('hidden');
    document.getElementById('editor-name').focus();
    document.getElementById('pkg-editor').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function saveEdit() {
    const name  = document.getElementById('editor-name').value.trim();
    const raw   = document.getElementById('editor-items').value;
    const items = raw.split('\n').map(s => s.trim()).filter(Boolean).slice(0, MAX_ITEMS);

    if (!name)        { showToast('Geef het pakket een naam'); return; }
    if (!items.length){ showToast('Voeg minimaal 1 item toe'); return; }

    if (editingId) {
      const pkg = packages.find(p => p.id === editingId);
      if (pkg) { pkg.name = name; pkg.items = items; }
    } else {
      const np = { id: 'pkg_' + Date.now(), name, items };
      packages.push(np);
      activePkgId = np.id;
      try { localStorage.setItem(ACTIVE_KEY, activePkgId); } catch {}
    }

    savePackages();
    document.getElementById('pkg-editor').classList.add('hidden');
    editingId = null;
    renderModalPkgList();
    showToast('✓ Pakket opgeslagen!');
  }

  function cancelEdit() {
    document.getElementById('pkg-editor').classList.add('hidden');
    editingId = null;
  }

  function deletePackage(id) {
    if (!confirm('Pakket verwijderen? Dit kan niet ongedaan worden gemaakt.')) return;
    packages = packages.filter(p => p.id !== id);
    if (activePkgId === id) {
      activePkgId = packages[0]?.id ?? null;
      try { if (activePkgId) localStorage.setItem(ACTIVE_KEY, activePkgId); } catch {}
    }
    savePackages();
    renderModalPkgList();
    showToast('Pakket verwijderd');
  }

  /* ── Persistence ────────────────────────────────────────── */
  function savePackages() {
    try { localStorage.setItem(PKGS_KEY, JSON.stringify(packages)); } catch {}
    if (typeof scheduleAutoSync === 'function') scheduleAutoSync();
  }

  /* ── Boot ───────────────────────────────────────────────── */
  function init() {
    let saved;
    try { saved = JSON.parse(localStorage.getItem(PKGS_KEY) || 'null'); } catch {}

    if (Array.isArray(saved) && saved.length > 0) {
      packages = saved;
      if (!packages.find(p => p.id === 'default')) packages.unshift(DEFAULT_PKG);
    } else {
      packages = [{ ...DEFAULT_PKG, items: [...DEFAULT_PKG.items] }];
      savePackages();
    }

    const savedActive = localStorage.getItem(ACTIVE_KEY);
    activePkgId = packages.find(p => p.id === savedActive)?.id ?? packages[0].id;

    try { spinHistory = JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch {}
    if (!Array.isArray(spinHistory)) spinHistory = [];

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    renderPkgSelect();
    renderItemsList();
    renderHistory();

    document.fonts.ready.then(() => drawWheel());
  }

  /* ── TTS ─────────────────────────────────────────────────── */
  function speak(text) {
    if (!window.speechSynthesis) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'nl-NL'; u.rate = 0.85;
    speechSynthesis.speak(u);
  }

  /* ── Tick sound ──────────────────────────────────────────── */
  function playTick() {
    try {
      if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = _audioCtx.createOscillator();
      const g   = _audioCtx.createGain();
      osc.connect(g); g.connect(_audioCtx.destination);
      osc.frequency.value = 800 + Math.random() * 300;
      g.gain.setValueAtTime(0.07, _audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, _audioCtx.currentTime + 0.04);
      osc.start(_audioCtx.currentTime);
      osc.stop(_audioCtx.currentTime + 0.04);
    } catch {}
  }

  /* ── Confetti ────────────────────────────────────────────── */
  function launchConfetti() {
    const root = document.createElement('div');
    root.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden';
    for (let i = 0; i < 50; i++) {
      const p = document.createElement('div');
      const s = 5 + Math.random() * 8;
      p.style.cssText = `
        position:absolute;top:-14px;
        left:${Math.random()*100}%;
        background:${COLORS[i % COLORS.length]};
        width:${s}px;height:${s}px;
        border-radius:${Math.random() > .5 ? '50%' : '2px'};
        animation:cfall ${.85 + Math.random() * 1.4}s ${Math.random() * .5}s linear forwards;
      `;
      root.appendChild(p);
    }
    document.body.appendChild(root);
    setTimeout(() => root.remove(), 3400);
  }

  /* ── Helpers ─────────────────────────────────────────────── */
  function _esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function _relTime(ts) {
    const d = Date.now() - ts;
    if (d < 60_000)     return 'zojuist';
    if (d < 3_600_000)  return Math.floor(d / 60_000)    + 'm';
    if (d < 86_400_000) return Math.floor(d / 3_600_000) + 'u';
    return Math.floor(d / 86_400_000) + 'd';
  }

  function showToast(msg) {
    let t = document.getElementById('_toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 3200);
  }

  /* ── Keyboard shortcuts ──────────────────────────────────── */
  document.addEventListener('keydown', e => {
    if (e.target.closest('input, textarea, select')) return;
    if (e.code === 'Space') { e.preventDefault(); spin(); }
    if (e.key  === 'Escape') { hideResult(); closePkgModal(); }
  });

  /* ── Backdrop clicks close their respective modals ───────── */
  document.getElementById('result-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) hideResult();
  });
  document.getElementById('pkg-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closePkgModal();
  });

  init();
  </script>
</body>
</html>
