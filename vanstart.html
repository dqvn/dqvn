<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Learn Dutch Words</title>
  <link rel="stylesheet" type="text/css" href="assets/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Charis+SIL:ital@0;1&family=Caveat:wght@500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="assets/dutch.ico">
  <script src="assets/NoSleep.min.js"></script>
  <script src="https://js.puter.com/v2/"></script>
</head>

<body>
  <header>
    <h1>Learn Dutch Words</h1>
    <h3 id="chapter"></h3>
    <button id="hide-meaning-btn" class="hdr-toggle-btn" title="Hide/show meanings">👁️</button>
  </header>
  <!-- ── Flashcard popup ─────────────────────────────────────────────── -->
  <div id="flashcard-popup" style="display:none;">
    <div id="fc-confetti-layer"></div>
    <div id="fc-flash-overlay"></div>
    <button id="fc-close-btn" title="Close">✕</button>

    <div id="fc-container">
      <!-- Header -->
      <div id="fc-header">
        <div id="fc-chapter-stats">Select a lesson to begin</div>
        <div class="fc-overall-wrap">
          <span style="font-size:0.72rem;opacity:0.8">Mastery</span>
          <div class="fc-overall-bar-bg"><div id="fc-overall-bar"></div></div>
          <span id="fc-overall-pct">0%</span>
        </div>
        <div class="fc-session-wrap">
          <span id="fc-session-count">0 / 0</span>
          <div class="fc-session-bar-bg"><div id="fc-session-bar"></div></div>
        </div>
      </div>

      <!-- Card scene -->
      <div id="fc-scene">
        <div id="fc-card">
          <!-- Box badge: absolute overlay on top-left of card -->
          <div id="fc-box-badge" class="fc-box-badge fc-badge-new">New</div>
          <!-- Front -->
          <div id="fc-front">
            <div id="fc-word">Hallo</div>
            <div id="fc-ipa" class="ipa-text">/ɦɑˈloː/</div>
            <div id="fc-phonetic">hah-low</div>
            <div id="fc-hint">👆 Tap to reveal</div>
            <button id="fc-speak-btn" class="fc-speak-btn" title="Repeat pronunciation">
              <span class="fc-speak-icon">🔊</span>
              <span>Hear it</span>
            </button>
          </div>
          <!-- Back (shown via .fc-visible class) -->
          <div id="fc-back">
            <div id="fc-english"></div>
            <div id="fc-vietnamese"></div>
            <div class="fc-back-divider"></div>
            <div class="fc-sentence-row">
              <button id="fc-sentence-speak-btn" class="fc-sentence-speak-btn" title="Hear Dutch sentence">🔊</button>
              <div id="fc-sentence-nl"></div>
            </div>
            <div id="fc-sentence-en"></div>
          </div>
        </div>
      </div>

      <!-- Rating buttons -->
      <div id="fc-actions" style="opacity:0;pointer-events:none">
        <button id="fc-hard-btn" class="fc-btn fc-hard">
          <span class="fc-btn-gesture">👈</span>
          <span class="fc-btn-icon">😰</span>
          <span class="fc-btn-label">Hard</span>
        </button>
        <button id="fc-good-btn" class="fc-btn fc-good">
          <span class="fc-btn-gesture">👆</span>
          <span class="fc-btn-icon">😊</span>
          <span class="fc-btn-label">Good</span>
        </button>
        <button id="fc-easy-btn" class="fc-btn fc-easy">
          <span class="fc-btn-gesture">👉</span>
          <span class="fc-btn-icon">🤩</span>
          <span class="fc-btn-label">Easy</span>
        </button>
      </div>

      <!-- Session complete -->
      <div id="fc-complete" style="display:none"></div>
    </div>
  </div>

  <div id="popup" style="display: none;">
    <button id="game-close-btn" title="Close game">✕</button>
    <div id="game-container">
      <h1>Dutch-English Vocabulary Game</h1>
      <div id="progress" class="sentence-example"></div>
      <div id="sentence" class="sentence-example"></div>
      <div id="question"></div>
      <div id="game-logic-wrapper">
        <div id="options"></div>
        <div id="result"></div>
      </div>
    </div>
  </div>
  <div class="container div-with-scrollbar">
    <button id="toggle-menu-button" class="toggle-menu-button">
      <span class="icon">&#9776;</span> </button>
    <div class="left-menu">
      <div class="spacer">
        <h4>Menu</h4>
        <div id="tts-name"></div>
        <select id="tts-voice-select"></select>
        <!-- add Volumn & Play button -->
        <div class="volume-control-container">
          <button class="play-stop-button" id="playStopButton">
            <div class="icon"></div>
            <span>Play</span>
          </button>
          <input type="range" id="volume-control" min="0" max="100" value="50">
          <span id="volume-value">50%</span>
        </div>
        <!-- Add simple game -->
        <button id="start-button" class="start-button">
          <span class="button-text">Start Game</span>
          <i class="fas fa-play"></i>
        </button>
        <span></span>
        <!-- Flashcard game -->
        <button id="flashcard-btn" class="start-button">
          <span class="button-text">Flashcards Game</span>
        </button>
      </div>
      <div class="spacer">
        <nav class="lm-nav">
          <a href="index.html" class="lm-nav-link" title="Go to Main">🏠 Main</a>
        </nav>
        <h4>Dutch Courses:</h4>
        <div class="file-container div-with-scrollbar">
          <ul id="file-list">
            <!-- file list will be inserted here -->
          </ul>
        </div>
      </div>

    <!-- Left-menu footer -->
    <footer id="lm-footer">
      <div class="lm-ft-avatar">QN</div>
      <div class="lm-ft-info">
        <span class="lm-ft-name">Quang, Nguyen Dang</span>
        <a class="lm-ft-email" href="mailto:dqvn2002@gmail.com">dqvn2002@gmail.com</a>
      </div>
      <span class="lm-ft-year" id="lm-year"></span>
    </footer>
    </div>

    <div class="table-container div-with-scrollbar">
      <table id="word-list">
        <thead>
          <tr>
            <th>No.</th>
            <th>Dutch</th>
            <th>English</th>
            <th>Sample</th>
            <th>Vietnamese</th>
          </tr>
        </thead>
        <tbody id="word-list-body">
          <!-- data will be inserted here -->
        </tbody>
      </table>
    </div>
  </div>
  <script src="assets/common.js"></script>
  <script src="assets/ttsvanstartscript.js"></script>
  <script src="assets/game.js"></script>
  <script src="assets/flashcard.js"></script>
</body>

</html>
