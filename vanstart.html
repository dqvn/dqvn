<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Learn Dutch Words</title>
  <link rel="stylesheet" type="text/css" href="assets/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Charis+SIL:ital@0;1&family=Caveat:wght@500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="assets/dutch.ico">
  <link rel="stylesheet" href="assets/sync.css">
  <script src="assets/NoSleep.min.js"></script>
</head>

<body>
  <header>
    <h1>Learn Dutch Words</h1>
    <h3 id="chapter"></h3>
    <div class="hdr-right">
      <button class="hdr-fs-btn" id="lm-fs-dec" aria-label="Decrease text size">A−</button>
      <button class="hdr-fs-btn" id="lm-fs-inc" aria-label="Increase text size">A+</button>
      <button id="hide-meaning-btn" class="hdr-toggle-btn" title="Hide/show meanings">👁️</button>
    </div>
  </header>
  <!-- flashcard-popup is injected by flashcard.js -->

  <div id="popup" style="display: none;">
    <button id="game-close-btn" title="Close game">✕</button>
    <div id="game-container">
      <h1>Dutch-English Vocabulary Game</h1>
      <div id="progress" class="sentence-example"></div>
      <div id="sentence" class="sentence-example"></div>
      <div id="question"></div>
      <div id="game-logic-wrapper">
        <div id="options"></div>
        <div id="result"></div>
      </div>
    </div>
  </div>
  <div class="container div-with-scrollbar">
    <button id="toggle-menu-button" class="toggle-menu-button">
      <span class="icon">&#9776;</span> </button>
    <div class="left-menu">
      <div class="spacer">
        <h4>Menu</h4>
        <div id="tts-name"></div>
        <select id="tts-voice-select"></select>
        <!-- add Volumn & Play button -->
        <div class="volume-control-container">
          <button class="play-stop-button" id="playStopButton">
            <div class="icon"></div>
            <span>Play</span>
          </button>
          <input type="range" id="volume-control" min="0" max="100" value="50">
          <span id="volume-value">50%</span>
        </div>
        <!-- Add simple game -->
        <button id="start-button" class="start-button">
          <span class="button-text">Start Game</span>
          <i class="fas fa-play"></i>
        </button>
        <span></span>
        <!-- Flashcard game -->
        <button id="flashcard-btn" class="start-button">
          <span class="button-text">Flashcards Game</span>
        </button>
      </div>
      <span></span>
      <div class="spacer">
        <nav class="lm-nav">
          <a href="index.html" class="lm-nav-link" title="Go to Main">🏠 Main</a>
        </nav>
        <h4>Dutch Courses:</h4>
        <div class="file-container div-with-scrollbar">
          <ul id="file-list">
            <!-- file list will be inserted here -->
          </ul>
        </div>
      </div>

    <!-- Cloud sync (populated by sync.js) -->
    <div id="sync-section"></div>

    <!-- Left-menu footer -->
    <footer id="lm-footer">
      <div class="lm-ft-avatar">QN</div>
      <div class="lm-ft-info">
        <span class="lm-ft-name">Quang, Nguyen Dang</span>
        <a class="lm-ft-email" href="mailto:dqvn2002@gmail.com">dqvn2002@gmail.com</a>
      </div>
      <span class="lm-ft-year" id="lm-year"></span>
    </footer>
    </div>

    <div class="table-container div-with-scrollbar">
      <table id="word-list">
        <thead>
          <tr>
            <th>No.</th>
            <th>Dutch</th>
            <th>English</th>
            <th>Sample</th>
            <th>Vietnamese</th>
          </tr>
        </thead>
        <tbody id="word-list-body">
          <!-- data will be inserted here -->
        </tbody>
      </table>
    </div>
  </div>
  <script src="assets/common.js"></script>
  <script src="assets/ttsvanstartscript.js"></script>
  <script src="assets/game.js"></script>
  <script src="assets/flashcard.js"></script>
  <script src="assets/sync.js" defer></script>
</body>

</html>
